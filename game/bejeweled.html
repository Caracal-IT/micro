<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bejeweled Crystal Quest 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(ellipse at bottom, #07020a 0%, #020204 100%);
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  overflow: hidden;
  user-select: none;
  perspective: 1200px;
}

#stars {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  border-radius: 50%;
  animation: twinkle var(--duration) ease-in-out infinite alternate;
  animation-delay: var(--delay);
}
@keyframes twinkle {
  0% { opacity: 0.25; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1.3); }
}

#game-wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 30px 40px 40px;
  background: rgba(22, 11, 33, 0.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 36px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-bottom: 3px solid rgba(255, 215, 0, 0.25);
  border-right: 2px solid rgba(255, 215, 0, 0.15);
  box-shadow: 
    0 25px 60px rgba(0, 0, 0, 0.5),
    0 0 80px rgba(130, 60, 200, 0.15),
    inset 0 0 40px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  transition: transform 0.12s ease-out, box-shadow 0.12s ease-out;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  gap: 20px;
  transform: translateZ(25px);
}

#title-area {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

h1 {
  font-size: 26px;
  font-weight: 300;
  letter-spacing: 5px;
  background: linear-gradient(135deg, #fff3a0 0%, #d4af37 40%, #fff3a0 70%, #d4af37 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 3s linear infinite;
  text-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
}

@keyframes shimmer {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

#stats-row {
  display: flex;
  gap: 15px;
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(255, 215, 0, 0.65);
  font-weight: 400;
}

#score-area {
  text-align: right;
}
#score-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(255,215,0,0.5);
  display: block;
}
#score {
  font-size: 34px;
  font-weight: 200;
  color: #fff3a0;
  line-height: 1.1;
  transition: transform 0.15s;
  text-shadow: 0 0 10px rgba(255, 243, 160, 0.3);
}
#score.pop { transform: scale(1.15); }

#progress-container {
  width: 100%;
  height: 8px;
  background: rgba(8, 4, 14, 0.85);
  border-radius: 4px;
  border: 1px solid rgba(255, 215, 0, 0.1);
  overflow: hidden;
  margin-top: -4px;
  margin-bottom: 2px;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.7);
  transform: translateZ(20px);
}
#progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #d4af37, #f7e05e, #fff5a0);
  box-shadow: 0 0 8px rgba(247, 224, 94, 0.6);
  transition: width 0.4s cubic-bezier(0.1, 0.8, 0.3, 1);
}

#board-wrap {
  position: relative;
  padding: 8px;
  background: linear-gradient(145deg, rgba(12,6,18,0.99), rgba(5,2,10,0.99));
  border-radius: 20px;
  border: 1px solid rgba(255,215,0,0.18);
  border-bottom: 2px solid rgba(255,215,0,0.3);
  box-shadow:
    0 15px 45px rgba(0,0,0,0.75),
    inset 0 0 35px rgba(0,0,0,0.9);
  transform: translateZ(10px);
}

#game-canvas {
  display: block;
  border-radius: 12px;
}

#bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  gap: 15px;
  margin-top: 5px;
  transform: translateZ(25px);
}

#message {
  font-size: 11px;
  color: rgba(255,215,0,0.6);
  letter-spacing: 2px;
  min-height: 16px;
  text-transform: uppercase;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

#mute-btn {
  background: rgba(255, 215, 0, 0.03);
  border: 1px solid rgba(255, 215, 0, 0.22);
  color: #d4af37;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#mute-btn:hover {
  background: rgba(255, 215, 0, 0.12);
  border-color: rgba(255, 215, 0, 0.4);
  box-shadow: 0 5px 12px rgba(255, 215, 0, 0.15), inset 0 1px 1px rgba(255,255,255,0.2);
  transform: translateY(-2px);
}
#mute-btn:active {
  transform: translateY(1px);
}

#reset-btn {
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
  border: 1px solid rgba(255,215,0,0.25);
  border-bottom: 2.5px solid rgba(255,215,0,0.4);
  color: #d4af37;
  padding: 8px 24px;
  border-radius: 20px;
  font-size: 12px;
  letter-spacing: 2px;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#reset-btn:hover {
  background: linear-gradient(135deg, rgba(255,215,0,0.22), rgba(255,215,0,0.08));
  border-color: rgba(255,215,0,0.42);
  box-shadow: 0 6px 15px rgba(255,215,0,0.15), inset 0 1px 1px rgba(255,255,255,0.2);
  transform: translateY(-2px);
}
#reset-btn:active {
  transform: translateY(1px);
  border-bottom-width: 1px;
}

@media (max-width: 560px) {
  #game-wrapper { padding: 16px; gap: 12px; border-radius: 20px; }
  h1 { font-size: 20px; letter-spacing: 3px; }
  #score { font-size: 26px; }
  #bottom-bar { flex-direction: column; gap: 10px; align-items: center; }
  .controls { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div id="stars"></div>

<div id="game-wrapper">
  <div id="header">
    <div id="title-area">
      <h1>✦ BEJEWELED ✦</h1>
      <div id="stats-row">
        <span id="level-label">LEVEL 1</span>
        <span id="high-score-label">BEST: <span id="high-score">0</span></span>
      </div>
    </div>
    <div id="score-area">
      <span id="score-label">SCORE</span>
      <span id="score">0</span>
    </div>
  </div>
  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>
  <div id="board-wrap">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="bottom-bar">
    <span id="message"></span>
    <div class="controls">
      <button id="mute-btn" title="Toggle Sound">🔊</button>
      <button id="reset-btn">✦ NEW GAME</button>
    </div>
  </div>
</div>

<script>
// ─── Config ─────────────────────────────────────────────────────────────
const ROWS = 8, COLS = 8;
const GEM_SIZE = 58, GAP = 4, CELL = GEM_SIZE + GAP;
const PAD = 6;
const W = COLS * CELL + PAD * 2;
const H = ROWS * CELL + PAD * 2;

// Colors with pre-parsed RGB equivalents for high speed 3D rendering
const COLORS = [
  { name:'Ruby',     m:'#ff0000', l:'#ff7777', d:'#660000', g:'rgba(255,0,0,0.3)', rgb_m:{r:255,g:0,b:0}, rgb_l:{r:255,g:119,b:119}, rgb_d:{r:102,g:0,b:0} },
  { name:'Emerald',  m:'#00ff00', l:'#99ff99', d:'#006600', g:'rgba(0,255,0,0.3)', rgb_m:{r:0,g:255,b:0}, rgb_l:{r:153,g:255,b:153}, rgb_d:{r:0,g:102,b:0} },
  { name:'Sapphire', m:'#0000ff', l:'#9999ff', d:'#000066', g:'rgba(0,0,255,0.3)', rgb_m:{r:0,g:0,b:255}, rgb_l:{r:153,g:153,b:255}, rgb_d:{r:0,g:0,b:102} },
  { name:'Amethyst', m:'#ff00ff', l:'#ff99ff', d:'#660066', g:'rgba(255,0,255,0.3)', rgb_m:{r:255,g:0,b:255}, rgb_l:{r:255,g:153,b:255}, rgb_d:{r:102,g:0,b:102} },
  { name:'Topaz',    m:'#ffcc00', l:'#ffff99', d:'#666600', g:'rgba(255,204,0,0.3)', rgb_m:{r:255,g:204,b:0}, rgb_l:{r:255,g:255,b:153}, rgb_d:{r:102,g:102,b:0} },
  { name:'Diamond',  m:'#00ffff', l:'#ccffff', d:'#009999', g:'rgba(0,255,255,0.3)', rgb_m:{r:0,g:255,b:255}, rgb_l:{r:204,g:255,b:255}, rgb_d:{r:0,g:153,b:153} },
  { name:'Pearl',    m:'#ffffff', l:'#ffccff', d:'#999999', g:'rgba(255,255,255,0.3)', rgb_m:{r:255,g:255,b:255}, rgb_l:{r:255,g:204,b:255}, rgb_d:{r:153,g:153,b:153} },
];

// ─── DOM references ─────────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// High-DPI Support
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
canvas.style.width = `${W}px`;
canvas.style.height = `${H}px`;
ctx.scale(dpr, dpr);

const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('message');
const highScoreEl = document.getElementById('high-score');
const progressBarEl = document.getElementById('progress-bar');
const levelLabelEl = document.getElementById('level-label');
const muteBtn = document.getElementById('mute-btn');

// ─── Sound System (Web Audio API Synth) ──────────────────────────────────
const Sound = {
  ctx: null,
  muted: false,

  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.warn("Web Audio API not supported", e);
    }
  },

  playClick() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(580, t);
    osc.frequency.exponentialRampToValueAtTime(120, t + 0.08);
    
    gain.gain.setValueAtTime(0.06, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    
    osc.start(t);
    osc.stop(t + 0.08);
  },

  playSwap() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(380, t + 0.14);
    
    gain.gain.setValueAtTime(0.04, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    
    osc.start(t);
    osc.stop(t + 0.14);
  },

  playMatch(combo = 1) {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    
    const t = this.ctx.currentTime;
    const baseFreqs = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
    const transpose = (combo - 1) * 2; // +2 semitones per combo level
    const factor = Math.pow(2, transpose / 12);
    
    baseFreqs.forEach((f, index) => {
      const freq = f * factor;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const delay = index * 0.04;
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + delay);
      
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.05, t + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.35);
      
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      
      osc.start(t + delay);
      osc.stop(t + delay + 0.35);
    });
  },

  playLevelUp() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    
    const t = this.ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98, 2093.00]; // Sparkly C major
    notes.forEach((freq, index) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const delay = index * 0.06;
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + delay);
      
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.03, t + delay + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.25);
      
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      
      osc.start(t + delay);
      osc.stop(t + delay + 0.25);
    });
  },

  playShuffle() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    
    const t = this.ctx.currentTime;
    const notes = [392.00, 311.13, 246.94, 196.00];
    notes.forEach((freq, index) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const delay = index * 0.12;
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + delay);
      
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.04, t + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.3);
      
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      
      osc.start(t + delay);
      osc.stop(t + delay + 0.3);
    });
  }
};

// Toggle Mute
let isMutedStored = localStorage.getItem('bejeweled_muted') === 'true';
Sound.muted = isMutedStored;
muteBtn.textContent = Sound.muted ? '🔇' : '🔊';

muteBtn.addEventListener('click', () => {
  Sound.init();
  Sound.muted = !Sound.muted;
  localStorage.setItem('bejeweled_muted', Sound.muted);
  muteBtn.textContent = Sound.muted ? '🔇' : '🔊';
  if (!Sound.muted) {
    Sound.playClick();
  }
});

// ─── Stars background (Multi-colored space dust) ───────────────────────
const rand = n => Math.random() * n | 0;

// ─── Stars background (Multi-colored space dust) ───────────────────────
(function createStars() {
  const c = document.getElementById('stars');
  const colors = ['#ffffff', '#fff3a0', '#82b3ff', '#ffa8e0', '#be9bf2'];
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = 1 + Math.random() * 2.5;
    const starColor = colors[rand(colors.length)];
    s.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      background:${starColor};
      --duration:${2.5+Math.random()*4.5}s;
      --delay:${Math.random()*5}s;
      opacity:${0.25+Math.random()*0.5};
      box-shadow: 0 0 ${size * 2}px ${starColor};
    `;
    c.appendChild(s);
  }
})();

function gemColor(type) { return COLORS[type]; }

function cellPos(col, row) {
  return { x: PAD + col * CELL, y: PAD + row * CELL };
}

// ─── Shading Calculation Helper ─────────────────────────────────────────
function getFacetColor(colorObj, dx, dy, lightX, lightY) {
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len === 0) return colorObj.m;
  const nx = dx / len;
  const ny = dy / len;
  const dot = nx * lightX + ny * lightY;
  
  // Map dot product [-1, 1] to [0, 1]
  const t = (dot + 1) / 2;

  let r, g, b;
  if (t < 0.5) {
    const f = t * 2;
    r = Math.round(colorObj.rgb_d.r + (colorObj.rgb_m.r - colorObj.rgb_d.r) * f);
    g = Math.round(colorObj.rgb_d.g + (colorObj.rgb_m.g - colorObj.rgb_d.g) * f);
    b = Math.round(colorObj.rgb_d.b + (colorObj.rgb_m.b - colorObj.rgb_d.b) * f);
  } else {
    const f = (t - 0.5) * 2;
    r = Math.round(colorObj.rgb_m.r + (colorObj.rgb_l.r - colorObj.rgb_m.r) * f);
    g = Math.round(colorObj.rgb_m.g + (colorObj.rgb_l.g - colorObj.rgb_m.g) * f);
    b = Math.round(colorObj.rgb_m.b + (colorObj.rgb_l.b - colorObj.rgb_m.b) * f);
  }
  return `rgb(${r},${g},${b})`;
}

// ─── Faceted Polygon Drawer ───
function drawFacetedPolygon(cx, cy, r, innerScale, numSides, colorObj, lightX, lightY, startAngle = -Math.PI/2) {
  const outer = [];
  const inner = [];
  for (let i = 0; i < numSides; i++) {
    const a = (i / numSides) * Math.PI * 2 + startAngle;
    outer.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
    inner.push({ x: cx + r * innerScale * Math.cos(a), y: cy + r * innerScale * Math.sin(a) });
  }

  // Draw outer facets with orbital shading
  for (let i = 0; i < numSides; i++) {
    const next = (i + 1) % numSides;
    const a = ((i + 0.5) / numSides) * Math.PI * 2 + startAngle;
    const fx = Math.cos(a);
    const fy = Math.sin(a);
    
    ctx.beginPath();
    ctx.moveTo(outer[i].x, outer[i].y);
    ctx.lineTo(outer[next].x, outer[next].y);
    ctx.lineTo(inner[next].x, inner[next].y);
    ctx.lineTo(inner[i].x, inner[i].y);
    ctx.closePath();
    ctx.fillStyle = getFacetColor(colorObj, fx, fy, lightX, lightY);
    ctx.fill();
  }

  // Flat top table
  ctx.beginPath();
  ctx.moveTo(inner[0].x, inner[0].y);
  inner.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
  ctx.closePath();
  
  const tableGrad = ctx.createRadialGradient(
    cx + lightX * r * 0.28, cy + lightY * r * 0.28, 0,
    cx, cy, r * innerScale
  );
  tableGrad.addColorStop(0, '#ffffff');
  tableGrad.addColorStop(0.35, colorObj.l);
  tableGrad.addColorStop(1, colorObj.m);
  ctx.fillStyle = tableGrad;
  ctx.fill();
}

// ─── Beautiful 3D Faceted Gem Rendering ──────────────────────────────────
function drawGem(cx, cy, r, type, alpha = 1, scale = 1, lightX = -0.4, lightY = -0.5) {
  const c = gemColor(type);
  const sr = r * scale;
  ctx.save();
  ctx.globalAlpha = alpha;

  // 1. Draw offset physical 3D drop shadow onto the slot beneath it
  ctx.shadowColor = 'rgba(0, 0, 0, 0.45)';
  ctx.shadowBlur = 8 * scale;
  ctx.shadowOffsetX = 3.5 * scale;
  ctx.shadowOffsetY = 4.5 * scale;

  // Base Silhouette Fill (to catch the drop shadow)
  if (type !== 6) {
    ctx.beginPath();
    if (type === 2) {
      // Teardrop path
      ctx.moveTo(cx, cy - sr);
      ctx.bezierCurveTo(cx - sr * 0.9, cy - sr * 0.3, cx - sr * 0.9, cy + sr * 0.6, cx, cy + sr);
      ctx.bezierCurveTo(cx + sr * 0.9, cy + sr * 0.6, cx + sr * 0.9, cy - sr * 0.3, cx, cy - sr);
    } else if (type === 5) {
      // Diamond profile
      ctx.moveTo(cx - sr * 0.7, cy - sr * 0.5);
      ctx.lineTo(cx + sr * 0.7, cy - sr * 0.5);
      ctx.lineTo(cx + sr * 0.95, cy - sr * 0.05);
      ctx.lineTo(cx, cy + sr * 0.95);
      ctx.lineTo(cx - sr * 0.95, cy - sr * 0.05);
    } else {
      octagonPath(cx, cy, sr);
    }
    ctx.closePath();
    ctx.fillStyle = c.d;
    ctx.fill();
  }

  // Clear shadow settings for precise facet rendering
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  // 2. Draw Dynamic Facets based on Type
  if (type === 0) {
    // ─── RUBY (Faceted Rhombus) ───
    drawFacetedPolygon(cx, cy, sr, 0.4, 4, c, lightX, lightY, -Math.PI/2);

  } else if (type === 1) {
    // ─── EMERALD (Emerald-Cut Rectangle) ───
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(0.88, 1.02);
    drawFacetedPolygon(0, 0, sr, 0.52, 8, c, lightX, lightY, -Math.PI/8);
    ctx.restore();

  } else if (type === 2) {
    // ─── SAPPHIRE (Faceted Triangle) ───
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1.0, 0.9);
    drawFacetedPolygon(0, 0, sr, 0.4, 3, c, lightX, lightY, -Math.PI/2);
    ctx.restore();

  } else if (type === 3) {
    // ─── AMETHYST (Faceted Hexagon) ───
    drawFacetedPolygon(cx, cy, sr, 0.46, 6, c, lightX, lightY, -Math.PI/2);

  } else if (type === 4) {
    // ─── TOPAZ (Elongated Cushion Kite) ───
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(0.85, 1.0);
    drawFacetedPolygon(0, 0, sr, 0.45, 4, c, lightX, lightY, -Math.PI/2);
    ctx.restore();

  } else if (type === 5) {
    // ─── DIAMOND (Classic Gemstone Crown Profile) ───
    const points = [
      { x: cx - sr * 0.7, y: cy - sr * 0.5 },
      { x: cx + sr * 0.7, y: cy - sr * 0.5 },
      { x: cx + sr * 0.95, y: cy - sr * 0.05 },
      { x: cx, y: cy + sr * 0.95 },
      { x: cx - sr * 0.95, y: cy - sr * 0.05 }
    ];
    const innerT1 = { x: cx - sr * 0.35, y: cy - sr * 0.15 };
    const innerT2 = { x: cx + sr * 0.35, y: cy - sr * 0.15 };

    // Upper Left Facet
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    ctx.lineTo(points[4].x, points[4].y);
    ctx.lineTo(innerT1.x, innerT1.y);
    ctx.closePath();
    ctx.fillStyle = getFacetColor(c, -1, -0.5, lightX, lightY);
    ctx.fill();

    // Upper Right Facet
    ctx.beginPath();
    ctx.moveTo(points[1].x, points[1].y);
    ctx.lineTo(points[2].x, points[2].y);
    ctx.lineTo(innerT2.x, innerT2.y);
    ctx.closePath();
    ctx.fillStyle = getFacetColor(c, 1, -0.5, lightX, lightY);
    ctx.fill();

    // Lower Left Pavilion Facet
    ctx.beginPath();
    ctx.moveTo(points[4].x, points[4].y);
    ctx.lineTo(points[3].x, points[3].y);
    ctx.lineTo(innerT1.x, innerT1.y);
    ctx.closePath();
    ctx.fillStyle = getFacetColor(c, -0.6, 1, lightX, lightY);
    ctx.fill();

    // Lower Right Pavilion Facet
    ctx.beginPath();
    ctx.moveTo(points[2].x, points[2].y);
    ctx.lineTo(points[3].x, points[3].y);
    ctx.lineTo(innerT2.x, innerT2.y);
    ctx.closePath();
    ctx.fillStyle = getFacetColor(c, 0.6, 1, lightX, lightY);
    ctx.fill();

    // Bottom Center Facet
    ctx.beginPath();
    ctx.moveTo(innerT1.x, innerT1.y);
    ctx.lineTo(innerT2.x, innerT2.y);
    ctx.lineTo(points[3].x, points[3].y);
    ctx.closePath();
    ctx.fillStyle = getFacetColor(c, 0, 1, lightX, lightY);
    ctx.fill();

    // Top Table Cap
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    ctx.lineTo(points[1].x, points[1].y);
    ctx.lineTo(innerT2.x, innerT2.y);
    ctx.lineTo(innerT1.x, innerT1.y);
    ctx.closePath();
    
    const tableGrad = ctx.createLinearGradient(
      cx - sr * 0.4, cy - sr * 0.5, 
      cx + sr * 0.4, cy - sr * 0.15
    );
    tableGrad.addColorStop(0, '#ffffff');
    tableGrad.addColorStop(0.35, c.l);
    tableGrad.addColorStop(1, c.m);
    ctx.fillStyle = tableGrad;
    ctx.fill();

    // Fine table divider line
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(innerT1.x, innerT1.y);
    ctx.lineTo(innerT2.x, innerT2.y);
    ctx.stroke();

  } else if (type === 6) {
    // ─── PEARL (Highly Shimmering 3D Sphere) ───
    const lx = lightX * sr * 0.42;
    const ly = lightY * sr * 0.42;

    ctx.shadowColor = 'rgba(253,121,168,0.4)';
    ctx.shadowBlur = 12 * scale;

    ctx.beginPath();
    ctx.arc(cx, cy, sr, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(
      cx + lx, cy + ly, sr * 0.05,
      cx + lx * 0.3, cy + ly * 0.3, sr * 1.05
    );
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.2, '#fde3ec');
    grad.addColorStop(0.65, c.m);
    grad.addColorStop(0.9, c.d);
    grad.addColorStop(1, '#531024');
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.shadowBlur = 0;

    // Bottom bounce reflection
    ctx.beginPath();
    ctx.arc(cx, cy, sr, 0, Math.PI * 2);
    const glossGrad = ctx.createRadialGradient(
      cx - lx * 0.7, cy - ly * 0.7, 0,
      cx - lx * 0.7, cy - ly * 0.7, sr * 0.75
    );
    glossGrad.addColorStop(0, 'rgba(255, 255, 255, 0.22)');
    glossGrad.addColorStop(0.4, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = glossGrad;
    ctx.fill();

    // Dynamic bright hotspot overlay
    ctx.beginPath();
    ctx.arc(cx + lx * 0.88, cy + ly * 0.88, sr * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
    ctx.fill();
  }

  // Draw super-fine outline to keep shapes beautifully crisp
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
  ctx.lineWidth = 0.8;
  if (type === 0 || type === 3 || type === 4) {
    ctx.stroke(octagon(cx, cy, sr));
  } else if (type === 1) {
    ctx.beginPath();
    const w = sr * 0.85;
    const h = sr * 0.95;
    const cut = sr * 0.3;
    ctx.moveTo(cx - w + cut, cy - h);
    ctx.lineTo(cx + w - cut, cy - h);
    ctx.lineTo(cx + w, cy - h + cut);
    ctx.lineTo(cx + w, cy + h - cut);
    ctx.lineTo(cx + w - cut, cy + h);
    ctx.lineTo(cx - w + cut, cy + h);
    ctx.lineTo(cx - w, cy + h - cut);
    ctx.lineTo(cx - w, cy - h + cut);
    ctx.closePath();
    ctx.stroke();
  } else if (type === 2) {
    ctx.beginPath();
    ctx.moveTo(cx, cy - sr);
    ctx.bezierCurveTo(cx - sr * 0.9, cy - sr * 0.3, cx - sr * 0.9, cy + sr * 0.6, cx, cy + sr);
    ctx.bezierCurveTo(cx + sr * 0.9, cy + sr * 0.6, cx + sr * 0.9, cy - sr * 0.3, cx, cy - sr);
    ctx.closePath();
    ctx.stroke();
  } else if (type === 5) {
    ctx.beginPath();
    ctx.moveTo(cx - sr * 0.7, cy - sr * 0.5);
    ctx.lineTo(cx + sr * 0.7, cy - sr * 0.5);
    ctx.lineTo(cx + sr * 0.95, cy - sr * 0.05);
    ctx.lineTo(cx, cy + sr * 0.95);
    ctx.lineTo(cx - sr * 0.95, cy - sr * 0.05);
    ctx.closePath();
    ctx.stroke();
  } else if (type === 6) {
    ctx.beginPath();
    ctx.arc(cx, cy, sr, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function octagon(cx, cy, r) {
  const p = new Path2D();
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    const px = cx + r * Math.cos(a);
    const py = cy + r * Math.sin(a);
    i === 0 ? p.moveTo(px, py) : p.lineTo(px, py);
  }
  p.closePath();
  return p;
}

function octagonPath(cx, cy, r) {
  ctx.moveTo(cx + r * Math.cos(-Math.PI/2), cy + r * Math.sin(-Math.PI/2));
  for (let i = 1; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
}

// ─── Board State ────────────────────────────────────────────────────────
let board = [];
let boardState = 'idle'; // idle | selected | animating
let selRow = -1, selCol = -1;
let score = 0;
let level = 1;
let highScore = localStorage.getItem('bejeweled_high_score') || 0;
highScoreEl.textContent = highScore;

let particles = [];
let floatTexts = [];

// Animations
let swapAnim = null;
let removeAnim = null;
let gravityAnim = null;
let pulseTime = 0;

function createBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      let t;
      do { t = rand(COLORS.length); } while (wouldMatch(r, c, t));
      board[r][c] = t;
    }
  }
}

function wouldMatch(row, col, type) {
  if (col >= 2 && board[row][col-1] === type && board[row][col-2] === type) return true;
  if (row >= 2 && board[row-1][col] === type && board[row-2][col] === type) return true;
  return false;
}

// ─── Match Finding ──────────────────────────────────────────────────────
function findMatches() {
  const matched = new Set();
  
  // Horizontal matches
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const t = board[r][c];
      if (t === -1) continue;
      let end = c + 1;
      while (end < COLS && board[r][end] === t) end++;
      if (end - c >= 3) {
        for (let i = c; i < end; i++) matched.add(r * COLS + i);
      }
      c = end - 1;
    }
  }
  
  // Vertical matches
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const t = board[r][c];
      if (t === -1) continue;
      let end = r + 1;
      while (end < ROWS && board[end][c] === t) end++;
      if (end - r >= 3) {
        for (let i = r; i < end; i++) matched.add(i * COLS + c);
      }
      r = end - 1;
    }
  }
  return [...matched].map(k => ({ row: Math.floor(k / COLS), col: k % COLS }));
}

function hasValidMoves() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // Swap right
      if (c + 1 < COLS) {
        [board[r][c], board[r][c+1]] = [board[r][c+1], board[r][c]];
        const matches = findMatches();
        [board[r][c], board[r][c+1]] = [board[r][c+1], board[r][c]];
        if (matches.length) return true;
      }
      // Swap down
      if (r + 1 < ROWS) {
        [board[r][c], board[r+1][c]] = [board[r+1][c], board[r][c]];
        const matches = findMatches();
        [board[r][c], board[r+1][c]] = [board[r+1][c], board[r][c]];
        if (matches.length) return true;
      }
    }
  }
  return false;
}

// ─── Particles & Floating Text ─────────────────────────────────────────
function spawnParticles(row, col, type) {
  const pos = cellPos(col, row);
  const cx = pos.x + GEM_SIZE / 2;
  const cy = pos.y + GEM_SIZE / 2;
  const c = gemColor(type);
  for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 90 + Math.random() * 220;
    particles.push({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 50,
      life: 1,
      decay: 0.65 + Math.random() * 0.85,
      size: 2.2 + Math.random() * 3.8,
      color: Math.random() > 0.45 ? c.l : c.m,
      angle: Math.random() * Math.PI,
      spin: (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 6),
    });
  }
}

function spawnFloatText(row, col, pts) {
  const pos = cellPos(col, row);
  floatTexts.push({
    x: pos.x + GEM_SIZE / 2,
    y: pos.y + GEM_SIZE / 2,
    text: `+${pts}`,
    life: 1,
    vy: -130,
    size: 16 + Math.min(pts, 300) / 12,
  });
}

// ─── Animation Helpers ──────────────────────────────────────────────────
function animateSwap(r1, c1, r2, c2, dur = 200) {
  return new Promise(resolve => {
    swapAnim = { r1, c1, r2, c2, t: 0, dur, resolve };
  });
}

function animateRemove(matches, dur = 320) {
  return new Promise(resolve => {
    for (const m of matches) {
      spawnParticles(m.row, m.col, board[m.row][m.col]);
      board[m.row][m.col] = -1;
    }
    removeAnim = { t: 0, dur, resolve };
  });
}

function animateGravity(moves, dur = 180) {
  return new Promise(resolve => {
    gravityAnim = { moves, t: 0, dur, resolve };
  });
}

// ─── Gravity Logic ──────────────────────────────────────────────────────
function applyGravity() {
  const moves = [];
  for (let c = 0; c < COLS; c++) {
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c] !== -1) {
        if (r !== writeRow) {
          board[writeRow][c] = board[r][c];
          board[r][c] = -1;
          moves.push({ fromRow: r, col: c, toRow: writeRow });
        }
        writeRow--;
      }
    }
    // Fill top empty spaces with new gems
    for (let r = writeRow; r >= 0; r--) {
      board[r][c] = rand(COLORS.length);
      moves.push({ fromRow: r - (writeRow + 1), col: c, toRow: r, isNew: true });
    }
  }
  return moves;
}

// ─── Scoring & Level Mechanics ──────────────────────────────────────────
function calcScore(matches, combo) {
  const base = matches.length >= 5 ? 120 : matches.length >= 4 ? 80 : 40;
  return base * combo;
}

function updateLevelProgress() {
  const target = level * 1000;
  const prevTarget = (level - 1) * 1000;
  const levelScore = score - prevTarget;
  const progressPercent = Math.min(100, Math.max(0, (levelScore / 1000) * 100));
  
  progressBarEl.style.width = `${progressPercent}%`;
  levelLabelEl.textContent = `LEVEL ${level}`;
  
  if (progressPercent >= 100) {
    levelUp();
  }
}

function levelUp() {
  level++;
  Sound.playLevelUp();
  
  msgEl.textContent = `✦ LEVEL UP! LEVEL ${level} ✦`;
  msgEl.style.color = '#fff3a0';
  msgEl.style.textShadow = '0 0 20px rgba(247,224,94,0.9), 0 0 45px rgba(212,175,55,0.6)';
  
  const boardWrap = document.getElementById('board-wrap');
  
  // Grand 3D Tilt and Pop Upward celebration!
  boardWrap.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.4s, box-shadow 0.4s';
  boardWrap.style.transform = 'perspective(1000px) rotateX(15deg) translateZ(35px) scale(1.05)';
  boardWrap.style.borderColor = '#fff3a0';
  boardWrap.style.boxShadow = '0 30px 60px rgba(247,224,94,0.4), 0 0 100px rgba(247,224,94,0.2)';
  
  // Burst 40 spectacular spinning star particles from the center!
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 110 + Math.random() * 320;
    particles.push({
      x: W / 2,
      y: H / 2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.25,
      decay: 0.5 + Math.random() * 0.4,
      size: 3 + Math.random() * 3.5,
      color: '#fff3a0',
      angle: Math.random() * Math.PI,
      spin: (Math.random() > 0.5 ? 1 : -1) * (5 + Math.random() * 8)
    });
  }

  setTimeout(() => {
    boardWrap.style.transform = '';
    boardWrap.style.borderColor = '';
    boardWrap.style.boxShadow = '';
    setTimeout(() => {
      boardWrap.style.transition = ''; // Restore tilt mouse control
    }, 400);
  }, 1200);
  
  // Award bonus points
  score += 500 * (level - 1);
  updateScore();
  updateLevelProgress();
}

function updateScore() {
  scoreEl.textContent = score;
  scoreEl.classList.remove('pop');
  void scoreEl.offsetWidth;
  scoreEl.classList.add('pop');
  
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('bejeweled_high_score', highScore);
    highScoreEl.textContent = highScore;
  }
}

// ─── Game Logic Loops ────────────────────────────────────────────────────
async function trySwap(r1, c1, r2, c2) {
  if (boardState === 'animating') return;
  boardState = 'animating';

  Sound.playSwap();

  // Swap animation
  await animateSwap(r1, c1, r2, c2);

  // Perform swap in board array
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];

  let matches = findMatches();
  if (matches.length) {
    let combo = 1;
    while (matches.length) {
      await sleep(60);
      
      const pts = calcScore(matches, combo);
      Sound.playMatch(combo);

      // Spawn floating numbers
      const mid = matches[Math.floor(matches.length / 2)];
      spawnFloatText(mid.row, mid.col, pts);

      score += pts;
      updateScore();
      updateLevelProgress();

      // Explode matches animation
      await animateRemove(matches);

      // Apply falling gems
      const moves = applyGravity();
      if (moves.length) {
        await animateGravity(moves);
      }

      // Check cascading matches
      matches = findMatches();
      combo++;
    }

    // Verify board has moves
    if (!hasValidMoves()) {
      msgEl.textContent = '✦ NO MOVES — SHUFFLING ✦';
      Sound.playShuffle();
      await sleep(700);
      shuffleBoard();
      msgEl.textContent = '';
    }
  } else {
    // Swap back if no match was found
    await animateSwap(r2, c2, r1, c1);
    [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
  }

  selRow = selCol = -1;
  boardState = 'idle';
}

function shuffleBoard() {
  const types = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      types.push(board[r][c]);

  for (let i = types.length - 1; i > 0; i--) {
    const j = rand(i + 1);
    [types[i], types[j]] = [types[j], types[i]];
  }

  let idx = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      board[r][c] = types[idx++];
    }
  }

  let m = findMatches();
  while (m.length) {
    for (const mm of m) {
      board[mm.row][mm.col] = rand(COLORS.length);
    }
    m = findMatches();
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Rendering loop ──────────────────────────────────────────────────────
function render(time) {
  ctx.clearRect(0, 0, W, H);

  // Elegant dark board backdrop
  ctx.fillStyle = 'rgba(6, 3, 11, 0.72)';
  roundRect(ctx, 0, 0, W, H, 12);
  ctx.fill();

  // Draw 3D Inset Cell Slots (blueprint metal grids)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const pos = cellPos(c, r);
      
      // Inset dark backdrop
      ctx.fillStyle = 'rgba(3, 1, 6, 0.55)';
      roundRect(ctx, pos.x, pos.y, GEM_SIZE, GEM_SIZE, 6);
      ctx.fill();

      // Sharp inner slot shadow lines
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.65)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(pos.x, pos.y, GEM_SIZE, GEM_SIZE);

      // Gold metal bevel overlay highlight
      ctx.strokeStyle = 'rgba(255, 215, 0, 0.038)';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(pos.x + 0.5, pos.y + 0.5, GEM_SIZE - 1, GEM_SIZE - 1);
    }
  }

  // Calculate dynamic 3D orbiting ray-cast light source direction
  const lightPeriod = time * 0.0015;
  const lightX = Math.cos(lightPeriod) * 0.42 - 0.38;
  const lightY = Math.sin(lightPeriod) * 0.42 - 0.38;

  // Draw Gems
  const r = GEM_SIZE * 0.44;
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const type = board[row][col];
      if (type === -1) continue;
      
      const pos = cellPos(col, row);
      let cx = pos.x + GEM_SIZE / 2;
      let cy = pos.y + GEM_SIZE / 2;
      let alpha = 1;
      let scale = 1;

      // Pulse selected gem
      if (selRow === row && selCol === col && boardState === 'selected') {
        const p = 1 + 0.05 * Math.sin(pulseTime * 5.5);
        scale = p;
      }

      // Smooth swap positioning
      if (swapAnim) {
        const s = swapAnim;
        const t = s.t;
        if (s.r1 === row && s.c1 === col) {
          const to = cellPos(s.c2, s.r2);
          cx += (to.x + GEM_SIZE/2 - cx) * t;
          cy += (to.y + GEM_SIZE/2 - cy) * t;
        } else if (s.r2 === row && s.c2 === col) {
          const to = cellPos(s.c1, s.r1);
          cx += (to.x + GEM_SIZE/2 - cx) * t;
          cy += (to.y + GEM_SIZE/2 - cy) * t;
        }
      }

      // Smooth gravity falling positioning
      if (gravityAnim) {
        const g = gravityAnim;
        for (const mv of g.moves) {
          if (mv.col === col && mv.toRow === row) {
            const fromPos = cellPos(col, mv.fromRow);
            cy = fromPos.y + GEM_SIZE / 2 + (cy - (fromPos.y + GEM_SIZE / 2)) * g.t;
            if (mv.isNew) {
              alpha = Math.min(1, g.t * 3);
            }
          }
        }
      }

      // Smooth burst scaling on match removal
      if (removeAnim) {
        alpha = 1 - removeAnim.t;
        scale = 1 + removeAnim.t * 0.25;
      }

      drawGem(cx, cy, r, type, alpha, scale, lightX, lightY);
    }
  }

  // Animated selection ring
  if (selRow >= 0 && selCol >= 0 && (boardState === 'selected' || boardState === 'idle')) {
    const pos = cellPos(selCol, selRow);
    const cx = pos.x + GEM_SIZE / 2;
    const cy = pos.y + GEM_SIZE / 2;
    const pulse = 1 + 0.06 * Math.sin(pulseTime * 5.5);
    ctx.save();
    ctx.strokeStyle = `rgba(255,215,0,${0.45 + 0.3 * Math.sin(pulseTime * 5.5)})`;
    ctx.lineWidth = 2.2 * pulse;
    ctx.shadowColor = 'rgba(255,215,0,0.35)';
    ctx.shadowBlur = 12;
    const path = octagon(cx, cy, GEM_SIZE * 0.46 * pulse);
    ctx.stroke(path);
    ctx.restore();
  }

  // Draw 3D Spinning Star Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle + p.spin * p.life);
    const starSize = p.size * p.life * 1.5;
    
    ctx.beginPath();
    ctx.moveTo(0, -starSize);
    ctx.lineTo(starSize * 0.3, -starSize * 0.3);
    ctx.lineTo(starSize, 0);
    ctx.lineTo(starSize * 0.3, starSize * 0.3);
    ctx.lineTo(0, starSize);
    ctx.lineTo(-starSize * 0.3, starSize * 0.3);
    ctx.lineTo(-starSize, 0);
    ctx.lineTo(-starSize * 0.3, -starSize * 0.3);
    ctx.closePath();
    ctx.fill();
    
    ctx.restore();
  }

  // Floating text popups
  for (const ft of floatTexts) {
    ctx.save();
    ctx.globalAlpha = ft.life;
    ctx.fillStyle = '#fff3a0';
    ctx.font = `bold ${ft.size}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(255,215,0,0.5)';
    ctx.shadowBlur = 10;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, rad) {
  ctx.beginPath();
  ctx.moveTo(x + rad, y);
  ctx.arcTo(x + w, y, x + w, y + h, rad);
  ctx.arcTo(x + w, y + h, x, y + h, rad);
  ctx.arcTo(x, y + h, x, y, rad);
  ctx.arcTo(x, y, x + w, y, rad);
  ctx.closePath();
}

// ─── Update loop elements ──────────────────────────────────────────────
function update(dt) {
  pulseTime += dt;

  // Swap
  if (swapAnim) {
    swapAnim.t = Math.min(1, swapAnim.t + dt * (1 / (swapAnim.dur / 1000)));
    if (swapAnim.t >= 1) {
      const r = swapAnim;
      swapAnim = null;
      r.resolve();
    }
  }

  // Remove
  if (removeAnim) {
    removeAnim.t = Math.min(1, removeAnim.t + dt * (1 / (removeAnim.dur / 1000)));
    if (removeAnim.t >= 1) {
      const r = removeAnim;
      removeAnim = null;
      r.resolve();
    }
  }

  // Gravity
  if (gravityAnim) {
    gravityAnim.t = Math.min(1, gravityAnim.t + dt * (1 / (gravityAnim.dur / 1000)));
    if (gravityAnim.t >= 1) {
      const r = gravityAnim;
      gravityAnim = null;
      r.resolve();
    }
  }

  // Particle physics with spin rate
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 450 * dt; // gravity
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Floating text physics
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const ft = floatTexts[i];
    ft.y += ft.vy * dt;
    ft.life -= 1.35 * dt;
    if (ft.life <= 0) floatTexts.splice(i, 1);
  }
}

// ─── Game Loop ──────────────────────────────────────────────────────────
let lastTime = 0;

function loop(time) {
  if (!lastTime) lastTime = time;
  const dt = Math.min(0.05, (time - lastTime) / 1000);
  lastTime = time;
  update(dt);
  render(time);
  requestAnimationFrame(loop);
}

// ─── Input management ───────────────────────────────────────────────────
function getGemFromClick(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const col = Math.floor((mx - PAD) / CELL);
  const row = Math.floor((my - PAD) / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
  return { row, col };
}

canvas.addEventListener('click', e => {
  const g = getGemFromClick(e);
  if (!g || boardState === 'animating') return;

  const { row, col } = g;

  Sound.playClick();

  // Deselect
  if (selRow === row && selCol === col) {
    selRow = selCol = -1;
    boardState = 'idle';
    return;
  }

  // First gem selection
  if (selRow === -1) {
    selRow = row;
    selCol = col;
    boardState = 'selected';
    return;
  }

  // Second adjacent gem selection — perform move
  const dr = Math.abs(selRow - row);
  const dc = Math.abs(selCol - col);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
    trySwap(selRow, selCol, row, col);
  } else {
    // Select new gem instead
    selRow = row;
    selCol = col;
    boardState = 'selected';
  }
});

// ─── Game resets ────────────────────────────────────────────────────────
function resetGame() {
  boardState = 'idle';
  selRow = selCol = -1;
  score = 0;
  level = 1;
  particles = [];
  floatTexts = [];
  swapAnim = null;
  removeAnim = null;
  gravityAnim = null;
  updateScore();
  updateLevelProgress();
  msgEl.textContent = '';
  createBoard();
  if (!hasValidMoves()) {
    shuffleBoard();
  }
  Sound.playLevelUp(); // Startup fanfare
}

document.getElementById('reset-btn').addEventListener('click', () => {
  Sound.init();
  resetGame();
});

// ─── Interactive 3D Card Hover Tilt Effects ─────────────────────────────
const wrapper = document.getElementById('game-wrapper');

// ─── Initialization ─────────────────────────────────────────────────────
resetGame();
requestAnimationFrame(loop);
</script>
