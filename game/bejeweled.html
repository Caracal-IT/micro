<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bejeweled Crystal Quest 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(ellipse at bottom, #07020a 0%, #020204 100%);
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  overflow: hidden;
  user-select: none;
  perspective: 1200px;
}

#stars {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  border-radius: 50%;
  animation: twinkle var(--duration) ease-in-out infinite alternate;
  animation-delay: var(--delay);
}
@keyframes twinkle {
  0% { opacity: 0.25; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1.3); }
}

#game-wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 30px 40px 40px;
  background: rgba(22, 11, 33, 0.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 36px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-bottom: 3px solid rgba(255, 215, 0, 0.25);
  border-right: 2px solid rgba(255, 215, 0, 0.15);
  box-shadow: 
    0 25px 60px rgba(0, 0, 0, 0.5),
    0 0 80px rgba(130, 60, 200, 0.15),
    inset 0 0 40px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  transition: transform 0.12s ease-out, box-shadow 0.12s ease-out;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  gap: 20px;
  transform: translateZ(25px);
}

#title-area {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

h1 {
  font-size: 26px;
  font-weight: 300;
  letter-spacing: 5px;
  background: linear-gradient(135deg, #fff3a0 0%, #d4af37 40%, #fff3a0 70%, #d4af37 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 3s linear infinite;
  text-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
}

@keyframes shimmer {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

#stats-row {
  display: flex;
  gap: 15px;
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(255, 215, 0, 0.65);
  font-weight: 400;
}

#score-area {
  text-align: right;
}
#score-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(255,215,0,0.5);
  display: block;
}
#score {
  font-size: 34px;
  font-weight: 200;
  color: #fff3a0;
  line-height: 1.1;
  transition: transform 0.15s;
  text-shadow: 0 0 10px rgba(255, 243, 160, 0.3);
}
#score.pop { transform: scale(1.15); }

#progress-container {
  width: 100%;
  height: 8px;
  background: rgba(8, 4, 14, 0.85);
  border-radius: 4px;
  border: 1px solid rgba(255, 215, 0, 0.1);
  overflow: hidden;
  margin-top: -4px;
  margin-bottom: 2px;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.7);
  transform: translateZ(20px);
}
#progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #d4af37, #f7e05e, #fff5a0);
  box-shadow: 0 0 8px rgba(247, 224, 94, 0.6);
  transition: width 0.4s cubic-bezier(0.1, 0.8, 0.3, 1);
}

#board-wrap {
  position: relative;
  padding: 8px;
  background: linear-gradient(145deg, rgba(12,6,18,0.99), rgba(5,2,10,0.99));
  border-radius: 20px;
  border: 1px solid rgba(255,215,0,0.18);
  border-bottom: 2px solid rgba(255,215,0,0.3);
  box-shadow:
    0 15px 45px rgba(0,0,0,0.75),
    inset 0 0 35px rgba(0,0,0,0.9);
  transform: translateZ(10px);
}

#game-canvas {
  display: block;
  border-radius: 12px;
}

#bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  gap: 15px;
  margin-top: 5px;
  transform: translateZ(25px);
}

#message {
  font-size: 11px;
  color: rgba(255,215,0,0.6);
  letter-spacing: 2px;
  min-height: 16px;
  text-transform: uppercase;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

#mute-btn {
  background: rgba(255, 215, 0, 0.03);
  border: 1px solid rgba(255, 215, 0, 0.22);
  color: #d4af37;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#mute-btn:hover {
  background: rgba(255, 215, 0, 0.12);
  border-color: rgba(255, 215, 0, 0.4);
  box-shadow: 0 5px 12px rgba(255, 215, 0, 0.15), inset 0 1px 1px rgba(255,255,255,0.2);
  transform: translateY(-2px);
}
#mute-btn:active {
  transform: translateY(1px);
}

#reset-btn {
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
  border: 1px solid rgba(255,215,0,0.25);
  border-bottom: 2.5px solid rgba(255,215,0,0.4);
  color: #d4af37;
  padding: 8px 24px;
  border-radius: 20px;
  font-size: 12px;
  letter-spacing: 2px;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#reset-btn:hover {
  background: linear-gradient(135deg, rgba(255,215,0,0.22), rgba(255,215,0,0.08));
  border-color: rgba(255,215,0,0.42);
  box-shadow: 0 6px 15px rgba(255,215,0,0.15), inset 0 1px 1px rgba(255,255,255,0.2);
  transform: translateY(-2px);
}
#reset-btn:active {
  transform: translateY(1px);
  border-bottom-width: 1px;
}

@media (max-width: 560px) {
  #game-wrapper { padding: 16px; gap: 12px; border-radius: 20px; }
  h1 { font-size: 20px; letter-spacing: 3px; }
  #score { font-size: 26px; }
  #bottom-bar { flex-direction: column; gap: 10px; align-items: center; }
  .controls { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div id="stars"></div>

<div id="game-wrapper">
  <div id="header">
    <div id="title-area">
      <h1>✦ BEJEWELED ✦</h1>
      <div id="stats-row">
        <span id="level-label">LEVEL 1</span>
        <span id="high-score-label">BEST: <span id="high-score">0</span></span>
      </div>
    </div>
    <div id="score-area">
      <span id="score-label">SCORE</span>
      <span id="score">0</span>
    </div>
  </div>
  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>
  <div id="board-wrap">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="bottom-bar">
    <span id="message"></span>
    <div class="controls">
      <button id="mute-btn" title="Toggle Sound">🔊</button>
      <button id="reset-btn">✦ NEW GAME</button>
    </div>
  </div>
</div>

<script>
// ─── Config ─────────────────────────────────────────────────────────────
const ROWS = 8, COLS = 8;
const GEM_SIZE = 58, GAP = 4, CELL = GEM_SIZE + GAP;
const PAD = 6;
const W = COLS * CELL + PAD * 2;
const H = ROWS * CELL + PAD * 2;

// Colors with pre-parsed RGB equivalents for high speed 3D rendering
const COLORS = [
   { name:'Ruby',     m:'#ff0000', l:'#ff7777', d:'#660000', g:'rgba(255,0,0,0.3)', rgb_m:{r:255,g:0,b:0}, rgb_l:{r:255,g:119,b:119}, rgb_d:{r:102,g:0,b:0} },
   { name:'Emerald',  m:'#00ff00', l:'#99ff99', d:'#006600', g:'rgba(0,255,0,0.3)', rgb_m:{r:0,g:255,b:0}, rgb_l:{r:153,g:255,b:153}, rgb_d:{r:0,g:102,b:0} },
   { name:'Sapphire', m:'#0000ff', l:'#9999ff', d:'#000066', g:'rgba(0,0,255,0.3)', rgb_m:{r:0,g:0,b:255}, rgb_l:{r:153,g:153,b:255}, rgb_d:{r:0,g:0,b:102} },
   { name:'Amethyst', m:'#ff00ff', l:'#ff99ff', d:'#660066', g:'rgba(255,0,255,0.3)', rgb_m:{r:255,g:0,b:255}, rgb_l:{r:255,g:153,b:255}, rgb_d:{r:102,g:0,b:102} },
   { name:'Topaz',    m:'#ffcc00', l:'#ffff99', d:'#666600', g:'rgba(255,204,0,0.3)', rgb_m:{r:255,g:204,b:0}, rgb_l:{r:255,g:255,b:153}, rgb_d:{r:102,g:102,b:0} },
   { name:'Diamond',  m:'#ff8800', l:'#ffbb66', d:'#884400', g:'rgba(255,136,0,0.3)', rgb_m:{r:255,g:136,b:0}, rgb_l:{r:255,g:187,b:102}, rgb_d:{r:136,g:68,b:0} },
   { name:'Pearl',    m:'#ffffff', l:'#ffccff', d:'#999999', g:'rgba(255,255,255,0.3)', rgb_m:{r:255,g:255,b:255}, rgb_l:{r:255,g:204,b:255}, rgb_d:{r:153,g:153,b:153} },
   { name:'Opal',     m:'#008080', l:'#40e0d0', d:'#003333', g:'rgba(0,220,200,0.35)', rgb_m:{r:0,g:128,b:128}, rgb_l:{r:64,g:224,b:208}, rgb_d:{r:0,g:51,b:51} },

];

// ─── DOM references ─────────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// High-DPI Support
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
canvas.style.width = `${W}px`;
canvas.style.height = `${H}px`;
ctx.scale(dpr, dpr);

const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('message');
const highScoreEl = document.getElementById('high-score');
const progressBarEl = document.getElementById('progress-bar');
const levelLabelEl = document.getElementById('level-label');
const muteBtn = document.getElementById('mute-btn');

// ─── Sound System (Web Audio API Synth) ──────────────────────────────────
const Sound = {
  ctx: null,
  muted: false,

  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.warn("Web Audio API not supported", e);
    }
  },

  playClick() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(580, t);
    osc.frequency.exponentialRampToValueAtTime(120, t + 0.08);
    
    gain.gain.setValueAtTime(0.06, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    
    osc.start(t);
    osc.stop(t + 0.08);
  },

  playSwap() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(380, t + 0.14);
    
    gain.gain.setValueAtTime(0.04, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    
    osc.start(t);
    osc.stop(t + 0.14);
  },

  playMatch(combo = 1) {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    
    const t = this.ctx.currentTime;
    const baseFreqs = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
    const transpose = (combo - 1) * 2; // +2 semitones per combo level
    const factor = Math.pow(2, transpose / 12);
    
    baseFreqs.forEach((f, index) => {
      const freq = f * factor;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const delay = index * 0.04;
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + delay);
      
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.05, t + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.35);
      
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      
      osc.start(t + delay);
      osc.stop(t + delay + 0.35);
    });
  },

  playLevelUp() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    
    const t = this.ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98, 2093.00]; // Sparkly C major
    notes.forEach((freq, index) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const delay = index * 0.06;
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + delay);
      
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.03, t + delay + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.25);
      
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      
      osc.start(t + delay);
      osc.stop(t + delay + 0.25);
    });
  },

  playShuffle() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    
    const t = this.ctx.currentTime;
    const notes = [392.00, 311.13, 246.94, 196.00];
    notes.forEach((freq, index) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const delay = index * 0.12;
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + delay);
      
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.04, t + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.3);
      
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      
      osc.start(t + delay);
      osc.stop(t + delay + 0.3);
    });
  }
};

// Toggle Mute
let isMutedStored = localStorage.getItem('bejeweled_muted') === 'true';
Sound.muted = isMutedStored;
muteBtn.textContent = Sound.muted ? '🔇' : '🔊';

muteBtn.addEventListener('click', () => {
  Sound.init();
  Sound.muted = !Sound.muted;
  localStorage.setItem('bejeweled_muted', Sound.muted);
  muteBtn.textContent = Sound.muted ? '🔇' : '🔊';
  if (!Sound.muted) {
    Sound.playClick();
  }
});

// ─── Stars background (Multi-colored space dust) ───────────────────────
const rand = n => Math.random() * n | 0;

// ─── Stars background (Multi-colored space dust) ───────────────────────
(function createStars() {
  const c = document.getElementById('stars');
  const colors = ['#ffffff', '#fff3a0', '#82b3ff', '#ffa8e0', '#be9bf2'];
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = 1 + Math.random() * 2.5;
    const starColor = colors[rand(colors.length)];
    s.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      background:${starColor};
      --duration:${2.5+Math.random()*4.5}s;
      --delay:${Math.random()*5}s;
      opacity:${0.25+Math.random()*0.5};
      box-shadow: 0 0 ${size * 2}px ${starColor};
    `;
    c.appendChild(s);
  }
})();

function gemColor(type) { return COLORS[type]; }

function cellPos(col, row) {
  return { x: PAD + col * CELL, y: PAD + row * CELL };
}

// ─── Shading Calculation Helper ─────────────────────────────────────────
function getFacetColorReal(colorObj, dx, dy, lightX, lightY, ambient = 0.04, specularIntensity = 0.85, shininess = 10) {
  const len = Math.sqrt(dx*dx + dy*dy);
  const nx = len > 0 ? dx / len : 0;
  const ny = len > 0 ? dy / len : 0;
  
  // Dot product of facet normal and dynamic orbiting light source
  const dot = nx * lightX + ny * lightY;
  
  // Map dot product [-1, 1] to [0, 1] for diffuse
  const diffuse = (dot + 1) / 2;
  
  // Specular glint on facets facing the light
  let spec = 0;
  if (dot > 0.65) {
    spec = Math.pow((dot - 0.65) / 0.35, shininess) * specularIntensity;
  }
  
  // Refractive fire/glow: opposite side facets catch internal color dispersion
  let refraction = 0;
  if (dot < -0.3) {
    refraction = Math.pow((-dot - 0.3) / 0.7, 3.5) * 0.45;
  }

  let r, g, b;
  if (diffuse < 0.5) {
    const f = diffuse * 2;
    r = colorObj.rgb_d.r + (colorObj.rgb_m.r - colorObj.rgb_d.r) * f;
    g = colorObj.rgb_d.g + (colorObj.rgb_m.g - colorObj.rgb_d.g) * f;
    b = colorObj.rgb_d.b + (colorObj.rgb_m.b - colorObj.rgb_d.b) * f;
  } else {
    const f = (diffuse - 0.5) * 2;
    r = colorObj.rgb_m.r + (colorObj.rgb_l.r - colorObj.rgb_m.r) * f;
    g = colorObj.rgb_m.g + (colorObj.rgb_l.g - colorObj.rgb_m.g) * f;
    b = colorObj.rgb_m.b + (colorObj.rgb_l.b - colorObj.rgb_m.b) * f;
  }

  // Blend internal refractive bloom (vibrant lighter color)
  r = Math.min(255, r + refraction * colorObj.rgb_l.r * 1.2);
  g = Math.min(255, g + refraction * colorObj.rgb_l.g * 1.2);
  b = Math.min(255, b + refraction * colorObj.rgb_l.b * 1.2);

  // Blend specular highlight (pure brilliant white)
  r = Math.round(r + spec * (255 - r));
  g = Math.round(g + spec * (255 - g));
  b = Math.round(b + spec * (255 - b));

  return `rgb(${r},${g},${b})`;
}

// ─── Sparkle Glint Drawing Helper ───
function drawGlint(cx, cy, size, rotation) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  
  // Double-pass star burst gradient
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)');
  grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
  grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
  ctx.fillStyle = grad;
  
  ctx.beginPath();
  // Vertical Spike
  ctx.moveTo(0, -size);
  ctx.quadraticCurveTo(0, 0, size * 0.08, 0);
  ctx.quadraticCurveTo(0, 0, 0, size);
  ctx.quadraticCurveTo(0, 0, -size * 0.08, 0);
  ctx.quadraticCurveTo(0, 0, 0, -size);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  // Horizontal Spike
  ctx.moveTo(-size, 0);
  ctx.quadraticCurveTo(0, 0, 0, size * 0.08);
  ctx.quadraticCurveTo(0, 0, size, 0);
  ctx.quadraticCurveTo(0, 0, 0, -size * 0.08);
  ctx.quadraticCurveTo(0, 0, -size, 0);
  ctx.closePath();
  ctx.fill();
  
  // Brilliant inner core
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
  ctx.fill();
  
  ctx.restore();
}

// ─── Shape Helper Points generators ───
function getCushionPoints(cx, cy, r, numPoints = 8) {
  const pts = [];
  for (let i = 0; i < numPoints; i++) {
    const a = (i / numPoints) * Math.PI * 2 - Math.PI / 2;
    const cos = Math.cos(a);
    const sin = Math.sin(a);
    const k = 0.65; // Cushion squareness factor
    const factor = 1 / Math.max(Math.abs(cos), Math.abs(sin));
    const rad = r * (1 - k + k * factor);
    pts.push({ x: cx + rad * cos, y: cy + rad * sin, nx: cos, ny: sin });
  }
  return pts;
}

function getEmeraldPoints(cx, cy, rx, ry, bevelSize) {
  return [
    { x: cx - rx + bevelSize, y: cy - ry, nx: 0, ny: -1 },
    { x: cx + rx - bevelSize, y: cy - ry, nx: 0, ny: -1 },
    { x: cx + rx,             y: cy - ry + bevelSize, nx: 1, ny: -1 },
    { x: cx + rx,             y: cy + ry - bevelSize, nx: 1, ny: 0 },
    { x: cx + rx - bevelSize, y: cy + ry, nx: 1, ny: 1 },
    { x: cx - rx + bevelSize, y: cy + ry, nx: 0, ny: 1 },
    { x: cx - rx,             y: cy + ry - bevelSize, nx: -1, ny: 1 },
    { x: cx - rx,             y: cy - ry + bevelSize, nx: -1, ny: 0 }
  ];
}

// ─── Beautiful 3D Faceted Gem Rendering ──────────────────────────────────
function drawGem(cx, cy, r, type, alpha = 1, scale = 1, lightX = -0.4, lightY = -0.5) {
  const c = gemColor(type);
  const sr = r * scale;
  ctx.save();
  ctx.globalAlpha = alpha;

  // 1. Draw smooth realistic 3D shadow
  ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
  ctx.shadowBlur = 9 * scale;
  ctx.shadowOffsetX = 4 * scale;
  ctx.shadowOffsetY = 5 * scale;

  // Draw base silhouette to catch drop shadow
  ctx.beginPath();
  if (type === 0 || type === 3 || type === 4) {
    // Octagon base
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
      ctx.lineTo(cx + sr * Math.cos(a), cy + sr * Math.sin(a));
    }
  } else if (type === 1) {
    // Emerald bevel base
    const pts = getEmeraldPoints(cx, cy, sr * 0.85, sr * 0.95, sr * 0.28);
    pts.forEach((p, idx) => {
      if (idx === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
  } else if (type === 2) {
    // Trillion curved triangle base
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
      const nextA = ((i + 1) / 3) * Math.PI * 2 - Math.PI / 2;
      const midA = a + Math.PI / 3;
      if (i === 0) ctx.moveTo(cx + sr * Math.cos(a), cy + sr * Math.sin(a));
      else ctx.lineTo(cx + sr * Math.cos(a), cy + sr * Math.sin(a));
      ctx.quadraticCurveTo(cx + sr * 1.05 * Math.cos(midA), cy + sr * 1.05 * Math.sin(midA), cx + sr * Math.cos(nextA), cy + sr * Math.sin(nextA));

  } else if (type === 5) {
    // Diamond circular perimeter base
    ctx.arc(cx, cy, sr, 0, Math.PI * 2);
  } else {
    // Spherical Cabochons (Pearl, Opal) base
    ctx.arc(cx, cy, sr, 0, Math.PI * 2);
  }
  ctx.closePath();
  ctx.fillStyle = c.d;
  ctx.fill();

  // Clear shadow settings for precise face rendering
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  // 2. Render Facets/Gradients dynamically based on gemstone type
  if (type === 0) {
    // ─── RUBY (Faceted Cushion Cut) ───
    const outer = getCushionPoints(cx, cy, sr, 8);
    const mid = getCushionPoints(cx, cy, sr * 0.72, 8);
    const inner = getCushionPoints(cx, cy, sr * 0.44, 8);

    // Outer facets (8)
    for (let i = 0; i < 8; i++) {

      ctx.moveTo(outer[i].x, outer[i].y);
      ctx.lineTo(outer[next].x, outer[next].y);
      ctx.lineTo(mid[next].x, mid[next].y);
      ctx.lineTo(mid[i].x, mid[i].y);

      ctx.lineTo(mid[next].x, mid[next].y);

  } else if (type === 1) {

    const outer = getEmeraldPoints(cx, cy, sr * 0.85, sr * 0.95, sr * 0.26);

    const inner = getEmeraldPoints(cx, cy, sr * 0.38, sr * 0.44, sr * 0.11);

    ctx.moveTo(inner[0].x, inner[0].y);
    for (let i = 1; i < 8; i++) ctx.lineTo(inner[i].x, inner[i].y);

    const outer = [];

    for (let i = 0; i < 6; i++) {

    // Outer facets (6 triangles/quads)
    for (let i = 0; i < 6; i++) {

      ctx.beginPath();
      ctx.moveTo(outer[i].x, outer[i].y);
      ctx.lineTo(outer[next].x, outer[next].y);

    ctx.moveTo(inner[0].x, inner[0].y);

  } else if (type === 3) {
    // ─── AMETHYST (Rose Hexagonal Brilliant) ───
    const outer = [];

    const inner = [];

      const lenMid = lenOuter * 0.72;

      mid.push({ x: cx + lenMid * cos, y: cy + lenMid * sin, nx: cos, ny: sin });

    const pY = lightY * sr * 0.28;

    // Fixed spot coordinates inside, slightly offset dynamically
    const spots = [
      { x: cx - sr * 0.3 + pX,       y: cy - sr * 0.2 + pY,       r: sr * 0.25, c: fireColors[0] },
      { x: cx + sr * 0.25 + pX * 0.5, y: cy - sr * 0.35 + pY * 0.5, r: sr * 0.22, c: fireColors[1] },

    ctx.beginPath();
    ctx.arc(cx + lightX * sr * 0.7, cy + lightY * sr * 0.7, sr * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.82)';
    ctx.fill();
  }

  // Draw super-fine crystalline outer edge to make facets pop beautifully
  ctx.restore(); // Exit clipped state for Opal, resets globalAlpha
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  if (type === 0 || type === 3 || type === 4) {
    ctx.stroke(octagon(cx, cy, sr));
  } else if (type === 1) {
    const pts = getEmeraldPoints(cx, cy, sr * 0.85, sr * 0.95, sr * 0.26);
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < 8; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.stroke();
  } else if (type === 2) {
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
      const nextA = ((i + 1) / 3) * Math.PI * 2 - Math.PI / 2;
      const midA = a + Math.PI / 3;
      ctx.moveTo(cx + sr * Math.cos(a), cy + sr * Math.sin(a));
      ctx.quadraticCurveTo(cx + sr * 1.05 * Math.cos(midA), cy + sr * 1.05 * Math.sin(midA), cx + sr * Math.cos(nextA), cy + sr * Math.sin(nextA));
    }
    ctx.stroke();
  } else {
    ctx.arc(cx, cy, sr, 0, Math.PI * 2);
    ctx.stroke();
  }

  // 3. Spontaneous High-Gloss Specular Sparkle Effect (using unique seed)
  const seed = cx * 13 + cy * 37;
  const sparkleCycle = (pulseTime * 0.8 + (seed % 100) * 0.04) % 6; // Sparkle every 6 seconds
  if (sparkleCycle < 0.6) {
    let size;
    if (sparkleCycle < 0.3) {
      size = (sparkleCycle / 0.3) * 11.5; // grow
    } else {
      size = (1 - (sparkleCycle - 0.3) / 0.3) * 11.5; // shrink
    }
    // Positioning glint at the dynamic light direction corner of the gem
    const gx = cx + lightX * sr * 0.75;
    const gy = cy + lightY * sr * 0.75;
    drawGlint(gx, gy, size * scale, sparkleCycle * 3);
  }

  ctx.restore();
}

function octagon(cx, cy, r) {
  const p = new Path2D();
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    const px = cx + r * Math.cos(a);
    const py = cy + r * Math.sin(a);
    i === 0 ? p.moveTo(px, py) : p.lineTo(px, py);
  }
  p.closePath();
  return p;
}

function octagonPath(cx, cy, r) {
  ctx.moveTo(cx + r * Math.cos(-Math.PI/2), cy + r * Math.sin(-Math.PI/2));
  for (let i = 1; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
}

// ─── Board State ────────────────────────────────────────────────────────
let board = [];
let boardState = 'idle'; // idle | selected | animating
let selRow = -1, selCol = -1;
let score = 0;
let level = 1;
let highScore = Number(localStorage.getItem('bejeweled_high_score')) || 0;
highScoreEl.textContent = highScore;

let particles = [];
let floatTexts = [];

// Animations
let swapAnim = null;
let removeAnim = null;
let gravityAnim = null;
let resetAnim = null;
let pulseTime = 0;

function animateReset(dur = 400) {
  return new Promise(resolve => {
    resetAnim = { t: 0, dur, resolve };
  });
}

function animateDropIn() {
  const moves = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      moves.push({ fromRow: -(c + 1), col: c, toRow: r, isNew: true });
    }
  }
  return animateGravity(moves, 600);
}

function createBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      let t;
      do { t = rand(COLORS.length); } while (wouldMatch(r, c, t));
      board[r][c] = t;
    }
  }
}

function wouldMatch(row, col, type) {
  if (col >= 2 && board[row][col-1] === type && board[row][col-2] === type) return true;
  if (row >= 2 && board[row-1][col] === type && board[row-2][col] === type) return true;
  return false;
}

// ─── Match Finding ──────────────────────────────────────────────────────
function findMatches() {
  const matched = new Set();
  
  // Horizontal matches
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const t = board[r][c];
      if (t === -1) continue;
      let end = c + 1;
      while (end < COLS && board[r][end] === t) end++;
      if (end - c >= 3) {
        for (let i = c; i < end; i++) matched.add(r * COLS + i);
      }
      c = end - 1;
    }
  }
  
  // Vertical matches
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const t = board[r][c];
      if (t === -1) continue;
      let end = r + 1;
      while (end < ROWS && board[end][c] === t) end++;
      if (end - r >= 3) {
        for (let i = r; i < end; i++) matched.add(i * COLS + c);
      }
      r = end - 1;
    }
  }
  return [...matched].map(k => ({ row: Math.floor(k / COLS), col: k % COLS }));
}

function hasValidMoves() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // Swap right
      if (c + 1 < COLS) {
        [board[r][c], board[r][c+1]] = [board[r][c+1], board[r][c]];
        const matches = findMatches();
        [board[r][c], board[r][c+1]] = [board[r][c+1], board[r][c]];
        if (matches.length) return true;
      }
      // Swap down
      if (r + 1 < ROWS) {
        [board[r][c], board[r+1][c]] = [board[r+1][c], board[r][c]];
        const matches = findMatches();
        [board[r][c], board[r+1][c]] = [board[r+1][c], board[r][c]];
        if (matches.length) return true;
      }
    }
  }
  return false;
}

function easeOutBounce(t) {
  const n1 = 7.5625, d1 = 2.75;
  if (t < 1 / d1) return n1 * t * t;
  if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
  if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
  return n1 * (t -= 2.625 / d1) * t + 0.984375;
}

// ─── Particles & Floating Text ─────────────────────────────────────────
function spawnParticles(row, col, type) {
  const pos = cellPos(col, row);
  const cx = pos.x + GEM_SIZE / 2;
  const cy = pos.y + GEM_SIZE / 2;
  const c = gemColor(type);
  for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 90 + Math.random() * 220;
    particles.push({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 50,
      life: 1,
      decay: 0.65 + Math.random() * 0.85,
      size: 2.2 + Math.random() * 3.8,
      color: Math.random() > 0.45 ? c.l : c.m,
      angle: Math.random() * Math.PI,
      spin: (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 6),
    });
  }
}

function spawnFloatText(row, col, pts) {
  const pos = cellPos(col, row);
  floatTexts.push({
    x: pos.x + GEM_SIZE / 2,
    y: pos.y + GEM_SIZE / 2,
    text: `+${pts}`,
    life: 1,
    vy: -130,
    size: 16 + Math.min(pts, 300) / 12,
  });
}

// ─── Animation Helpers ──────────────────────────────────────────────────
function animateSwap(r1, c1, r2, c2, dur = 200) {
  return new Promise(resolve => {
    swapAnim = { r1, c1, r2, c2, t: 0, dur, resolve };
  });
}

function animateRemove(matches, dur = 320) {
  return new Promise(resolve => {
    for (const m of matches) {
      spawnParticles(m.row, m.col, board[m.row][m.col]);
      board[m.row][m.col] = -1;
    }
    removeAnim = { t: 0, dur, resolve };
  });
}

function animateGravity(moves, dur = 420) {
  return new Promise(resolve => {
    gravityAnim = { moves, t: 0, dur, resolve };
  });
}

// ─── Gravity Logic ──────────────────────────────────────────────────────
function applyGravity() {
  const moves = [];
  for (let c = 0; c < COLS; c++) {
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c] !== -1) {
        if (r !== writeRow) {
          board[writeRow][c] = board[r][c];
          board[r][c] = -1;
          moves.push({ fromRow: r, col: c, toRow: writeRow });
        }
        writeRow--;
      }
    }
    // Fill top empty spaces with new gems
    for (let r = writeRow; r >= 0; r--) {
      board[r][c] = rand(COLORS.length);
      moves.push({ fromRow: r - (writeRow + 1), col: c, toRow: r, isNew: true });
    }
  }
  return moves;
}

// ─── Scoring & Level Mechanics ──────────────────────────────────────────
function calcScore(matches, combo) {
  const base = matches.length >= 5 ? 120 : matches.length >= 4 ? 80 : 40;
  return base * combo;
}

function updateLevelProgress() {
  const target = level * 1000;
  const prevTarget = (level - 1) * 1000;
  const levelScore = score - prevTarget;
  const progressPercent = Math.min(100, Math.max(0, (levelScore / 1000) * 100));
  
  progressBarEl.style.width = `${progressPercent}%`;
  levelLabelEl.textContent = `LEVEL ${level}`;
  
  if (progressPercent >= 100 && level < 100) {
    levelUp();
  }
}

function levelUp() {
  level++;
  Sound.playLevelUp();
  
  msgEl.textContent = `✦ LEVEL UP! LEVEL ${level} ✦`;
  msgEl.style.color = '#fff3a0';
  msgEl.style.textShadow = '0 0 20px rgba(247,224,94,0.9), 0 0 45px rgba(212,175,55,0.6)';
  
  const boardWrap = document.getElementById('board-wrap');
  
  boardWrap.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.4s, box-shadow 0.4s';
  boardWrap.style.transform = 'perspective(1000px) rotateX(15deg) translateZ(35px) scale(1.05)';
  boardWrap.style.borderColor = '#fff3a0';
  boardWrap.style.boxShadow = '0 30px 60px rgba(247,224,94,0.4), 0 0 100px rgba(247,224,94,0.2)';
  
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 110 + Math.random() * 320;
    particles.push({
      x: W / 2,
      y: H / 2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.25,
      decay: 0.5 + Math.random() * 0.4,
      size: 3 + Math.random() * 3.5,
      color: '#fff3a0',
      angle: Math.random() * Math.PI,
      spin: (Math.random() > 0.5 ? 1 : -1) * (5 + Math.random() * 8)
    });
  }
  
  setTimeout(() => {
    boardWrap.style.transform = '';
    boardWrap.style.borderColor = '';
    boardWrap.style.boxShadow = '';
    setTimeout(() => {
      boardWrap.style.transition = '';
    }, 400);
  }, 1200);
  
  score += 500 * (level - 1);
  updateScore();
  updateLevelProgress();
}


function updateScore() {
  scoreEl.textContent = score;
  scoreEl.classList.remove('pop');
  void scoreEl.offsetWidth;
  scoreEl.classList.add('pop');
  
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('bejeweled_high_score', highScore);
    highScoreEl.textContent = highScore;
  }
}

// ─── Game Logic Loops ────────────────────────────────────────────────────
async function trySwap(r1, c1, r2, c2) {
  if (boardState === 'animating') return;
  boardState = 'animating';

  try {
    Sound.playSwap();

    // Swap animation
    await animateSwap(r1, c1, r2, c2);

    // Perform swap in board array
    [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];

    let matches = findMatches();
    if (matches.length) {
      let combo = 1;
      while (matches.length) {
        await sleep(60);
        
        const pts = calcScore(matches, combo);
        Sound.playMatch(combo);

        // Spawn floating numbers
        const mid = matches[Math.floor(matches.length / 2)];
        spawnFloatText(mid.row, mid.col, pts);

        score += pts;
        updateScore();
        updateLevelProgress();

        // Explode matches animation
        await animateRemove(matches);

        // Apply falling gems
        const moves = applyGravity();
        if (moves.length) {
          await animateGravity(moves);
        }

        // Check cascading matches
        matches = findMatches();
        combo++;
      }

      // Verify board has moves
      if (!hasValidMoves()) {
        msgEl.textContent = '✦ NO MOVES — SHUFFLING ✦';
        Sound.playShuffle();
        await sleep(500);
        await animateReset(350);
        shuffleBoard();
        await animateDropIn();
        msgEl.textContent = '';
      }
    } else {
      // Swap back if no match was found
      await animateSwap(r2, c2, r1, c1);
      [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
    }
  } catch (e) {
    console.error('Swap error:', e);
  }

  selRow = selCol = -1;
  boardState = 'idle';
}

function shuffleBoard() {
  let attempts = 0;
  do {
    const types = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        types.push(board[r][c]);

    for (let i = types.length - 1; i > 0; i--) {
      const j = rand(i + 1);
      [types[i], types[j]] = [types[j], types[i]];
    }

    let idx = 0;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        board[r][c] = types[idx++];
      }
    }

    let m = findMatches();
    let sanity = 0;
    while (m.length && sanity < 100) {
      for (const mm of m) {
        board[mm.row][mm.col] = rand(COLORS.length);
      }
      m = findMatches();
      sanity++;
    }
    attempts++;
  } while (!hasValidMoves() && attempts < 50);
  // fallback: rebuild entire board if still no moves
  if (!hasValidMoves()) {
    createBoard();
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Rendering loop ──────────────────────────────────────────────────────
function render(time) {
  ctx.clearRect(0, 0, W, H);

  // Elegant dark board backdrop
  ctx.fillStyle = 'rgba(6, 3, 11, 0.72)';
  roundRect(ctx, 0, 0, W, H, 12);
  ctx.fill();

  // Draw 3D Inset Cell Slots (blueprint metal grids)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const pos = cellPos(c, r);
      
      // Inset dark backdrop
      ctx.fillStyle = 'rgba(3, 1, 6, 0.55)';
      roundRect(ctx, pos.x, pos.y, GEM_SIZE, GEM_SIZE, 6);
      ctx.fill();

      // Sharp inner slot shadow lines
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.65)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(pos.x, pos.y, GEM_SIZE, GEM_SIZE);

      // Gold metal bevel overlay highlight
      ctx.strokeStyle = 'rgba(255, 215, 0, 0.038)';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(pos.x + 0.5, pos.y + 0.5, GEM_SIZE - 1, GEM_SIZE - 1);
    }
  }

  // Calculate dynamic 3D orbiting ray-cast light source direction
  const lightPeriod = time * 0.0015;
  const lightX = Math.cos(lightPeriod) * 0.42 - 0.38;
  const lightY = Math.sin(lightPeriod) * 0.42 - 0.38;

  // Draw Gems
  const r = GEM_SIZE * 0.44;
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const type = board[row][col];
      if (type === -1) continue;
      
      const pos = cellPos(col, row);
      let cx = pos.x + GEM_SIZE / 2;
      let cy = pos.y + GEM_SIZE / 2;
      let alpha = 1;
      let scale = 1;

      // Pulse selected gem
      if (selRow === row && selCol === col && boardState === 'selected') {
        const p = 1 + 0.05 * Math.sin(pulseTime * 5.5);
        scale = p;
      }

      // Smooth swap positioning
      if (swapAnim) {
        const s = swapAnim;
        const t = s.t;
        if (s.r1 === row && s.c1 === col) {
          const to = cellPos(s.c2, s.r2);
          cx += (to.x + GEM_SIZE/2 - cx) * t;
          cy += (to.y + GEM_SIZE/2 - cy) * t;
        } else if (s.r2 === row && s.c2 === col) {
          const to = cellPos(s.c1, s.r1);
          cx += (to.x + GEM_SIZE/2 - cx) * t;
          cy += (to.y + GEM_SIZE/2 - cy) * t;
        }
      }

      // Smooth gravity falling positioning
      if (gravityAnim) {
        const g = gravityAnim;
        const t = g.t;
        for (const mv of g.moves) {
          if (mv.col === col && mv.toRow === row) {
            const fromPos = cellPos(col, mv.fromRow);
            if (mv.isNew) {
              const bt = easeOutBounce(t);
              const fromY = fromPos.y + GEM_SIZE / 2;
              const toY = cy;
              cy = fromY + (toY - fromY) * bt;
              // landing glow ring
              if (t > 0.7 && t < 1) {
                const ringAlpha = (t - 0.7) / 0.3;
                ctx.save();
                ctx.globalAlpha = (1 - ringAlpha) * 0.5;
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.5 + ringAlpha * 3;
                ctx.shadowColor = 'rgba(255,255,255,0.6)';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(cx, cy, r * (0.7 + ringAlpha * 0.4), 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
              }
            } else {
              cy = fromPos.y + GEM_SIZE / 2 + (cy - (fromPos.y + GEM_SIZE / 2)) * t;
            }
          }
        }
      }


      // Reset fadeout
      if (resetAnim) {
        const ft = resetAnim.t;
        alpha *= (1 - ft);
        scale *= (0.5 + 0.5 * (1 - ft));
      }

      drawGem(cx, cy, r, type, alpha, scale, lightX, lightY);
    }
  }

  // Animated selection ring
  if (selRow >= 0 && selCol >= 0 && (boardState === 'selected' || boardState === 'idle')) {
    const pos = cellPos(selCol, selRow);
    const cx = pos.x + GEM_SIZE / 2;
    const cy = pos.y + GEM_SIZE / 2;
    const pulse = 1 + 0.06 * Math.sin(pulseTime * 5.5);
    ctx.save();
    ctx.strokeStyle = `rgba(255,215,0,${0.45 + 0.3 * Math.sin(pulseTime * 5.5)})`;
    ctx.lineWidth = 2.2 * pulse;
    ctx.shadowColor = 'rgba(255,215,0,0.35)';
    ctx.shadowBlur = 12;
    const path = octagon(cx, cy, GEM_SIZE * 0.46 * pulse);
    ctx.stroke(path);
    ctx.restore();
  }

  // Draw 3D Spinning Star Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle + p.spin * p.life);
    const starSize = p.size * p.life * 1.5;
    
    ctx.beginPath();
    ctx.moveTo(0, -starSize);
    ctx.lineTo(starSize * 0.3, -starSize * 0.3);
    ctx.lineTo(starSize, 0);
    ctx.lineTo(starSize * 0.3, starSize * 0.3);
    ctx.lineTo(0, starSize);
    ctx.lineTo(-starSize * 0.3, starSize * 0.3);
    ctx.lineTo(-starSize, 0);
    ctx.lineTo(-starSize * 0.3, -starSize * 0.3);
    ctx.closePath();
    ctx.fill();
    
    ctx.restore();
  }

  // Floating text popups
  for (const ft of floatTexts) {
    ctx.save();
    ctx.globalAlpha = ft.life;
    ctx.fillStyle = '#fff3a0';
    ctx.font = `bold ${ft.size}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(255,215,0,0.5)';
    ctx.shadowBlur = 10;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, rad) {
  ctx.beginPath();
  ctx.moveTo(x + rad, y);
  ctx.arcTo(x + w, y, x + w, y + h, rad);
  ctx.arcTo(x + w, y + h, x, y + h, rad);
  ctx.arcTo(x, y + h, x, y, rad);
  ctx.arcTo(x, y, x + w, y, rad);
  ctx.closePath();
}

// ─── Update loop elements ──────────────────────────────────────────────
function update(dt) {
  pulseTime += dt;

  // Swap
  if (swapAnim) {
    swapAnim.t = Math.min(1, swapAnim.t + dt * (1 / (swapAnim.dur / 1000)));
    if (swapAnim.t >= 1) {
      const r = swapAnim;
      swapAnim = null;
      r.resolve();
    }
  }

  // Remove
  if (removeAnim) {
    removeAnim.t = Math.min(1, removeAnim.t + dt * (1 / (removeAnim.dur / 1000)));
    if (removeAnim.t >= 1) {
      const r = removeAnim;
      removeAnim = null;
      r.resolve();
    }
  }

  // Gravity
  if (gravityAnim) {
    gravityAnim.t = Math.min(1, gravityAnim.t + dt * (1 / (gravityAnim.dur / 1000)));
    if (gravityAnim.t >= 1) {
      const r = gravityAnim;
      gravityAnim = null;
      r.resolve();
    }
  }

  // Reset fadeout
  if (resetAnim) {
    resetAnim.t = Math.min(1, resetAnim.t + dt * (1 / (resetAnim.dur / 1000)));
    if (resetAnim.t >= 1) {
      const r = resetAnim;
      resetAnim = null;
      r.resolve();
    }
  }

  // Particle physics with spin rate
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 450 * dt; // gravity
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Floating text physics
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const ft = floatTexts[i];
    ft.y += ft.vy * dt;
    ft.life -= 1.35 * dt;
    if (ft.life <= 0) floatTexts.splice(i, 1);
  }
}

// ─── Game Loop ──────────────────────────────────────────────────────────
let lastTime = 0;

function loop(time) {
  if (!lastTime) lastTime = time;
  const dt = Math.min(0.05, (time - lastTime) / 1000);
  lastTime = time;
  update(dt);
  render(time);
  requestAnimationFrame(loop);
}

// ─── Input management ───────────────────────────────────────────────────
function getGemFromClick(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const col = Math.floor((mx - PAD) / CELL);
  const row = Math.floor((my - PAD) / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
  return { row, col };
}

function handleInput(e) {
  const g = getGemFromClick(e);
  if (!g || boardState === 'animating') return;

  const { row, col } = g;

  Sound.playClick();

  // Deselect
  if (selRow === row && selCol === col) {
    selRow = selCol = -1;
    boardState = 'idle';
    return;
  }

  // First gem selection
  if (selRow === -1) {
    selRow = row;
    selCol = col;
    boardState = 'selected';
    return;
  }

  // Second adjacent gem selection — perform move
  const dr = Math.abs(selRow - row);
  const dc = Math.abs(selCol - col);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
    trySwap(selRow, selCol, row, col);
  } else {
    // Select new gem instead
    selRow = row;
    selCol = col;
    boardState = 'selected';
  }
}

canvas.addEventListener('pointerdown', handleInput);

// ─── Game resets ────────────────────────────────────────────────────────
async function resetGame() {
  boardState = 'animating';
  selRow = selCol = -1;
  score = 0;
  level = 1;
  particles = [];
  floatTexts = [];
  swapAnim = null;
  removeAnim = null;
  gravityAnim = null;
  resetAnim = null;
  msgEl.textContent = '';

  updateScore();
  updateLevelProgress();

  // Fade out current gems
  await animateReset(400);

  // Create fresh board
  createBoard();
  if (!hasValidMoves()) {
    shuffleBoard();
  }

  boardState = 'idle';
  Sound.playLevelUp();
}

document.getElementById('reset-btn').addEventListener('click', () => {
  Sound.init();
  resetGame();
});

// ─── Interactive 3D Card Hover Tilt Effects ─────────────────────────────
const wrapper = document.getElementById('game-wrapper');

// ─── Initialization ─────────────────────────────────────────────────────
createBoard();
if (!hasValidMoves()) {
  shuffleBoard();
}
boardState = 'idle';
Sound.playLevelUp();
requestAnimationFrame(loop);
</script>
