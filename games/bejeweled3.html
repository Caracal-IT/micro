<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejeweled</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
    body::before {
      background:
        radial-gradient(1px 1px at 10% 20%, #fff 100%, transparent),
        radial-gradient(1px 1px at 25% 45%, #fff 100%, transparent),
        radial-gradient(1.5px 1.5px at 40% 10%, #fff 100%, transparent),
        radial-gradient(1px 1px at 55% 70%, #fff 100%, transparent),
        radial-gradient(1.5px 1.5px at 70% 30%, #fff 100%, transparent),
        radial-gradient(1px 1px at 85% 60%, #fff 100%, transparent),
        radial-gradient(1px 1px at 15% 80%, #fff 100%, transparent),
        radial-gradient(1.5px 1.5px at 30% 15%, #fff 100%, transparent),
        radial-gradient(1px 1px at 50% 90%, #fff 100%, transparent),
        radial-gradient(1px 1px at 65% 55%, #fff 100%, transparent),
        radial-gradient(1.5px 1.5px at 80% 85%, #fff 100%, transparent),
        radial-gradient(1px 1px at 5% 50%, #fff 100%, transparent),
        radial-gradient(1px 1px at 45% 35%, #fff 100%, transparent),
        radial-gradient(1.5px 1.5px at 60% 5%, #fff 100%, transparent),
        radial-gradient(1px 1px at 75% 45%, #fff 100%, transparent),
        radial-gradient(1px 1px at 90% 25%, #fff 100%, transparent),
        radial-gradient(1.5px 1.5px at 20% 60%, #fff 100%, transparent),
        radial-gradient(1px 1px at 35% 75%, #fff 100%, transparent),
        radial-gradient(1px 1px at 95% 40%, #fff 100%, transparent),
        radial-gradient(1.5px 1.5px at 8% 90%, #fff 100%, transparent);
      animation: twinkle 3s ease-in-out infinite alternate;
    }
    body::after {
      background:
        radial-gradient(1px 1px at 12% 38%, #aaccff 100%, transparent),
        radial-gradient(1px 1px at 48% 62%, #ffddaa 100%, transparent),
        radial-gradient(1px 1px at 72% 18%, #aaccff 100%, transparent),
        radial-gradient(1px 1px at 33% 88%, #ffddaa 100%, transparent),
        radial-gradient(1px 1px at 88% 72%, #aaccff 100%, transparent),
        radial-gradient(1px 1px at 5% 15%, #ffddaa 100%, transparent),
        radial-gradient(1px 1px at 62% 42%, #aaccff 100%, transparent),
        radial-gradient(1px 1px at 18% 52%, #ffddaa 100%, transparent),
        radial-gradient(1px 1px at 78% 8%, #aaccff 100%, transparent),
        radial-gradient(1px 1px at 42% 28%, #ffddaa 100%, transparent);
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .menu {
      position: relative; z-index: 1; width: 420px; padding: 50px 40px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,215,0,0.25); border-radius: 24px; text-align: center;
      box-shadow: 0 0 60px rgba(255,215,0,0.08), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .menu h1 {
      font-size: 52px; font-weight: bold; letter-spacing: 4px; text-transform: uppercase;
      background: linear-gradient(180deg, #ffe066 0%, #d4a017 40%, #b8860b 60%, #ffe066 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px rgba(255,215,0,0.3));
    }
    .menu .subtitle {
      font-size: 14px; letter-spacing: 6px; text-transform: uppercase;
      background: linear-gradient(90deg, rgba(255,215,0,0.3), rgba(255,215,0,0.7), rgba(255,215,0,0.3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 40px;
    }
    .menu .divider {
      width: 60%; height: 1px; margin: 0 auto 40px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.4), transparent);
    }
    .menu .btn-play {
      display: inline-block; padding: 16px 60px; font-size: 20px; font-weight: bold;
      letter-spacing: 3px; text-transform: uppercase; color: #1a1a2e;
      background: linear-gradient(135deg, #ffe066, #d4a017, #b8860b);
      border: none; border-radius: 50px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 30px rgba(255,215,0,0.2);
      font-family: 'Georgia', serif;
    }
    .menu .btn-play:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,215,0,0.4); }
    .menu .btn-play:active { transform: scale(0.97); }
    .menu .decor {
      display: flex; justify-content: center; gap: 30px; margin-top: 35px;
      font-size: 22px; color: rgba(255,215,0,0.25); letter-spacing: 10px;
    }

    .hidden { display: none !important; }

    .board-wrap {
      position: relative; z-index: 1; width: 560px; padding: 30px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 24px;
      box-shadow: 0 0 60px rgba(255,215,0,0.06), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .board-wrap .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; padding: 0 4px;
    }
    .board-wrap .header h2 {
      font-size: 18px; letter-spacing: 3px; text-transform: uppercase;
      background: linear-gradient(90deg, #ffe066, #d4a017);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .board-wrap .header .score { font-size: 18px; color: #ffe066; letter-spacing: 1px; }
    .board-wrap .header .score span { color: #fff; }
    .board-wrap .header .btn-back {
      background: none; border: 1px solid rgba(255,215,0,0.3);
      color: rgba(255,215,0,0.7); padding: 6px 16px; border-radius: 20px;
      cursor: pointer; font-family: 'Georgia', serif; font-size: 13px;
      transition: border-color 0.2s, color 0.2s;
    }
    .board-wrap .header .btn-back:hover { border-color: rgba(255,215,0,0.6); color: #ffe066; }

    .grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      gap: 4px;
      width: 500px;
      height: 500px;
      margin: 0 auto;
    }

    /* ============= GEM BASE ============= */
    .gem {
      position: relative;
      width: 100%;
      height: 100%;
      cursor: pointer;
      transform-origin: center center;
      box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 0 10px rgba(255,255,255,0.2);
      transition: transform 0.15s ease; /* Re-added for smooth selection scale */
      will-change: transform;
      isolation: isolate;
      overflow: hidden; /* Ensure SVG doesn't bleed outside the gem div */
    }
    .gem svg {
      width: 100%;
      height: 100%;
      display: block; /* Remove extra space below SVG */
    }

    .gem.selected {
      transform: scale(1.1);
      z-index: 10;
    }

    .gem-removing {
      animation: gemPop 0.3s ease forwards;
    }
    @keyframes gemPop {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
      100% { transform: scale(0); opacity: 0; }
    }

    /* Individual gem color styles and complex SVG fills */

    @media (max-width: 650px) {
      .board-wrap { width: 95vw; padding: 16px; }
      .grid { width: calc(95vw - 36px); height: calc(95vw - 36px); }
    }
  </style>
</head>
<body>
  <div class="menu" id="menu">
    <h1>BEJEWELED</h1>
    <div class="subtitle">Diamond Edition</div>
    <div class="divider"></div>
    <button class="btn-play" id="playBtn">Play</button>
    <div class="decor">&#9670; &#9670; &#9670;</div>
  </div>

  <div class="board-wrap hidden" id="boardWrap">
    <div class="header">
      <button class="btn-back" id="backBtn">&larr; Menu</button>
      <h2>Bejeweled</h2>
      <div class="score">Score: <span id="scoreDisplay">0</span></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    const TYPES = ['ruby','emerald','sapphire','amethyst','topaz','garnet','diamond'];
    const ROWS = 8, COLS = 8;
    let board = [];
    let score = 0;
    let selected = null;
    let busy = false;

    function randType() { return TYPES[Math.floor(Math.random() * TYPES.length)]; }

    // Detailed SVG definitions for each gem type with facets and gradients
    const GEM_SVGS = {
      ruby: `

          </defs>

          <!-- Facets -->
          <path d="M50 8 L70 30 L50 40 L30 30 Z" fill="rgba(255,255,255,0.1)"/>
          <path d="M50 40 L70 30 L85 50 L70 70 L50 60 L30 70 L15 50 L30 30 Z" fill="rgba(0,0,0,0.1)"/>

          <!-- Edge Highlight/Shadow -->
          <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,80,120,0.4)" stroke-width="1"/>
          <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1" transform="translate(1,1)"/>
          <!-- Specular Highlight -->
          <ellipse cx="30" cy="25" rx="15" ry="10" fill="url(#rubyLightGrad)" transform="rotate(-15 30 25)" mix-blend-mode="screen"/>
        </svg>
      `,
      emerald: `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="emeraldMainGrad" cx="35%" cy="35%" r="70%">
              <stop offset="0%" stop-color="#3aff7a"/>

            </radialGradient>
            <radialGradient id="emeraldLightGrad" cx="30%" cy="25%" r="50%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
          </defs>
          <rect x="15" y="15" width="70" height="70" rx="8" ry="8" fill="url(#emeraldMainGrad)"/>
          <!-- Facets -->
          <path d="M25 15 L75 15 L75 25 L25 25 Z" fill="rgba(255,255,255,0.15)"/>
          <path d="M15 25 L25 25 L25 75 L15 75 Z" fill="rgba(255,255,255,0.1)"/>
          <path d="M75 25 L85 25 L85 75 L75 75 Z" fill="rgba(0,0,0,0.1)"/>
          <path d="M25 75 L75 75 L75 85 L25 85 Z" fill="rgba(0,0,0,0.15)"/>
          <!-- Inner facets -->
          <rect x="35" y="35" width="30" height="30" rx="4" ry="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
          <!-- Edge Highlight/Shadow -->
          <rect x="15" y="15" width="70" height="70" rx="8" ry="8" fill="none" stroke="rgba(80,255,150,0.4)" stroke-width="1"/>
          <rect x="15" y="15" width="70" height="70" rx="8" ry="8" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1" transform="translate(1,1)"/>

      `,
      sapphire: `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="sapphireMainGrad" cx="35%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#3a7aff"/>

          <path d="M50 15 L70 30 L50 45 L30 30 Z" fill="rgba(255,255,255,0.15)"/>

          <!-- Edge Highlight/Shadow -->

          <ellipse cx="50" cy="50" rx="45" ry="35" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1" transform="translate(1,1)"/>
          <!-- Specular Highlight -->
          <ellipse cx="30" cy="25" rx="15" ry="10" fill="url(#sapphireLightGrad)" transform="rotate(-15 30 25)" mix-blend-mode="screen"/>
        </svg>
      `,
      amethyst: `

          <defs>
            <radialGradient id="amethystMainGrad" cx="35%" cy="35%" r="70%">

          <!-- Facets -->

          <polygon points="50 50, 70 35, 85 50, 70 65" fill="rgba(0,0,0,0.1)"/>

          <!-- Edge Highlight/Shadow -->
          <polygon points="50 5, 80 25, 95 50, 80 75, 50 95, 20 75, 5 50, 20 25" fill="none" stroke="rgba(200,120,255,0.4)" stroke-width="1"/>
          <polygon points="50 5, 80 25, 95 50, 80 75, 50 95, 20 75, 5 50, 20 25" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1" transform="translate(1,1)"/>
          <!-- Specular Highlight -->
          <ellipse cx="30" cy="25" rx="15" ry="10" fill="url(#amethystLightGrad)" transform="rotate(-15 30 25)" mix-blend-mode="screen"/>
        </svg>
      `,
      topaz: `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="topazMainGrad" cx="35%" cy="35%" r="70%">
              <stop offset="0%" stop-color="#ffcc55"/>
              <stop offset="50%" stop-color="#d48a10"/>
              <stop offset="100%" stop-color="#6b3a00"/>
            </radialGradient>
            <radialGradient id="topazLightGrad" cx="30%" cy="25%" r="50%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
          </defs>
          <polygon points="50 5, 85 25, 85 75, 50 95, 15 75, 15 25" fill="url(#topazMainGrad)"/>
          <!-- Facets -->
          <polygon points="50 20, 70 30, 50 40, 30 30 Z" fill="rgba(255,255,255,0.15)"/>
          <polygon points="50 40, 70 30, 80 50, 70 70, 50 60, 30 70, 20 50, 30 30 Z" fill="rgba(0,0,0,0.1)"/>
          <polygon points="50 60, 70 70, 50 80, 30 70 Z" fill="rgba(255,255,255,0.15)"/>
          <!-- Edge Highlight/Shadow -->
          <polygon points="50 5, 85 25, 85 75, 50 95, 15 75, 15 25" fill="none" stroke="rgba(255,200,80,0.4)" stroke-width="1"/>
          <polygon points="50 5, 85 25, 85 75, 50 95, 15 75, 15 25" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1" transform="translate(1,1)"/>
          <!-- Specular Highlight -->
          <ellipse cx="30" cy="25" rx="15" ry="10" fill="url(#topazLightGrad)" transform="rotate(-15 30 25)" mix-blend-mode="screen"/>
        </svg>
      `,
      garnet: `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="garnetMainGrad" cx="35%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#ff4a4a"/>
              <stop offset="50%" stop-color="#cc0000"/>
              <stop offset="100%" stop-color="#4d0000"/>
            </radialGradient>
            <radialGradient id="garnetLightGrad" cx="30%" cy="25%" r="50%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
          </defs>
          <path d="M50 5 C65 5 80 20 80 40 C80 60 65 80 50 95 C35 80 20 60 20 40 C20 20 35 5 50 5 Z" fill="url(#garnetMainGrad)"/>
          <!-- Facets - simpler for teardrop shape -->
          <path d="M50 25 L65 40 L50 55 L35 40 Z" fill="rgba(255,255,255,0.15)"/>
          <path d="M50 55 L65 40 L75 60 L50 80 L25 60 L35 40 Z" fill="rgba(0,0,0,0.1)"/>
          <!-- Edge Highlight/Shadow -->
          <path d="M50 5 C65 5 80 20 80 40 C80 60 65 80 50 95 C35 80 20 60 20 40 C20 20 35 5 50 5 Z" fill="none" stroke="rgba(200,80,80,0.4)" stroke-width="1"/>
          <path d="M50 5 C65 5 80 20 80 40 C80 60 65 80 50 95 C35 80 20 60 20 40 C20 20 35 5 50 5 Z" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1" transform="translate(1,1)"/>
          <!-- Specular Highlight -->
          <ellipse cx="30" cy="25" rx="15" ry="10" fill="url(#garnetLightGrad)" transform="rotate(-15 30 25)" mix-blend-mode="screen"/>
        </svg>
      `,
      diamond: `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="diamondMainGrad" cx="35%" cy="35%" r="70%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="50%" stop-color="#e0ecff"/>
              <stop offset="100%" stop-color="#7a8aa0"/>
            </radialGradient>
            <radialGradient id="diamondLightGrad" cx="30%" cy="25%" r="50%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
          </defs>
          <polygon points="50 5, 60 8, 70 15, 80 25, 88 35, 95 50, 95 65, 88 75, 80 85, 70 92, 60 95, 50 95, 40 92, 30 85, 22 75, 15 65, 15 50, 22 35, 30 25, 40 15" fill="url(#diamondMainGrad)"/>
          <!-- Table facet -->
          <polygon points="50 35, 60 40, 60 60, 50 65, 40 60, 40 40 Z" fill="rgba(255,255,255,0.25)"/>
          <!-- Star facets -->
          <path d="M50 35 L60 40 L50 20 L40 40 Z" fill="rgba(255,255,255,0.15)"/>
          <path d="M60 40 L50 20 L75 25 L80 40 Z" fill="rgba(0,0,0,0.1)"/>
          <path d="M40 40 L50 20 L25 25 L20 40 Z" fill="rgba(255,255,255,0.1)"/>
          <!-- Upper girdle facets -->
          <path d="M50 65 L60 60 L70 70 L50 80 Z" fill="rgba(0,0,0,0.15)"/>
          <path d="M50 65 L40 60 L30 70 L50 80 Z" fill="rgba(255,255,255,0.15)"/>
          <path d="M70 70 L60 60 L80 75 L70 92 Z" fill="rgba(0,0,0,0.1)"/>
          <path d="M30 70 L40 60 L20 75 L30 92 Z" fill="rgba(255,255,255,0.1)"/>
          <!-- Pavilion facets (simplified) -->
          <path d="M50 65 L60 80 L50 95 L40 80 Z" fill="rgba(255,255,255,0.1)"/>
          <path d="M50 95 L60 80 L70 92 L50 95 Z" fill="rgba(0,0,0,0.1)"/>
          <path d="M50 95 L40 80 L30 92 L50 95 Z" fill="rgba(255,255,255,0.1)"/>
          <!-- Edge Highlight/Shadow -->
          <polygon points="50 5, 60 8, 70 15, 80 25, 88 35, 95 50, 95 65, 88 75, 80 85, 70 92, 60 95, 50 95, 40 92, 30 85, 22 75, 15 65, 15 50, 22 35, 30 25, 40 15" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
          <polygon points="50 5, 60 8, 70 15, 80 25, 88 35, 95 50, 95 65, 88 75, 80 85, 70 92, 60 95, 50 95, 40 92, 30 85, 22 75, 15 65, 15 50, 22 35, 30 25, 40 15" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1" transform="translate(1,1)"/>
          <!-- Specular Highlight -->
          <ellipse cx="30" cy="25" rx="15" ry="10" fill="url(#diamondLightGrad)" transform="rotate(-15 30 25)" mix-blend-mode="screen"/>
        </svg>
      `
    };

    function createGem(type, extra) {
      const el = document.createElement('div');
      el.className = 'gem gem-' + type + (extra ? ' ' + extra : '');
      el.innerHTML = GEM_SVGS[type]; // Inject the full SVG
      return el;
    }

    function fillBoard() {
      for (let c = 0; c < COLS; c++) {
        for (let r = ROWS - 1; r >= 0; r--) {
          if (board[r][c] === null) {
            for (let r2 = r - 1; r2 >= 0; r2--) {
              if (board[r2][c] !== null) {
                board[r][c] = board[r2][c];
                board[r2][c] = null;
                break;
              }
            }
            if (board[r][c] === null) board[r][c] = randType();
          }
        }
      }
    }

    function findMatches() {
      const matched = new Set();
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS - 2; c++) {
          const t = board[r][c];
          if (t && t === board[r][c+1] && t === board[r][c+2]) {
            matched.add(r+','+c); matched.add(r+','+(c+1)); matched.add(r+','+(c+2));
            while (c+3 < COLS && board[r][c+3] === t) { matched.add(r+','+(c+3)); c++; }
          }
        }
      }
      for (let r = 0; r < ROWS - 2; r++) {
        for (let c = 0; c < COLS; c++) {
          const t = board[r][c];
          if (t && t === board[r+1][c] && t === board[r+2][c]) {
            matched.add(r+','+c); matched.add((r+1)+','+c); matched.add((r+2)+','+c);
            while (r+3 < ROWS && board[r+3][c] === t) { matched.add((r+3)+','+c); r++; }
          }
        }
      }
      return matched;
    }

    function removeMatches(matched) {
      let pts = 0;
      for (const key of matched) {
        const [r, c] = key.split(',').map(Number);
        board[r][c] = null;
        pts += 10;
      }
      score += pts;
      document.getElementById('scoreDisplay').textContent = score;
    }

    function hasAnyMatch() { return findMatches().size > 0; }

    function scrambleNoMatches() {
      do {
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            board[r][c] = randType();
      } while (hasAnyMatch());
    }

    function renderBoard(highlights) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const t = board[r][c];
          if (!t) continue;
          const isSel = selected && selected[0] === r && selected[1] === c;
          const gem = createGem(t, isSel ? 'selected' : '');
          if (highlights && highlights.has(r+','+c)) gem.classList.add('gem-removing');
          gem.addEventListener('click', () => clickGem(r, c));
          grid.appendChild(gem);
        }
      }
    }

    function clickGem(r, c) {
      if (busy || !board[r][c]) return;
      if (!selected) { selected = [r, c]; renderBoard(); return; }
      if (selected[0] === r && selected[1] === c) { selected = null; renderBoard(); return; }
      const [sr, sc] = selected;
      if (Math.abs(sr - r) + Math.abs(sc - c) !== 1) { selected = [r, c]; renderBoard(); return; }
      selected = null;
      trySwap(sr, sc, r, c);
    }

    function trySwap(r1, c1, r2, c2) {
      busy = true;
      [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
      renderBoard();
      setTimeout(() => {
        const matched = findMatches();
        if (matched.size === 0) {
          [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
          renderBoard();
          busy = false;
        } else {
          processMatches(matched);
        }
      }, 200);
    }

    function processMatches(matched) {
      renderBoard(matched);
      setTimeout(() => {
        removeMatches(matched);
        fillBoard();
        renderBoard();
        setTimeout(() => {
          const next = findMatches();
          next.size > 0 ? processMatches(next) : busy = false;
        }, 300);
      }, 300);
    }

    function initGame() {
      board = [];
      for (let r = 0; r < ROWS; r++) board[r] = new Array(COLS).fill(null);
      scrambleNoMatches();
      score = 0;
      selected = null;
      document.getElementById('scoreDisplay').textContent = '0';
      renderBoard();
    }

    document.getElementById('playBtn').addEventListener('click', () => {
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('boardWrap').classList.remove('hidden');
      initGame();
    });

    document.getElementById('backBtn').addEventListener('click', () => {
      document.getElementById('boardWrap').classList.add('hidden');
      document.getElementById('menu').classList.remove('hidden');
    });
  </script>
</body>
</html>
