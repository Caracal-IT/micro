<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@400;700&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            padding: 40px 16px;
            font-family: 'Cinzel', serif;
            color: #ffd700;
            background: linear-gradient(180deg, #03150e 0%, #063d29 50%, #02120c 100%);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(24px, 6vw, 40px);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 20px rgba(255,215,0,0.6);
        }

        .card {
            display: block;
            width: min(360px, 90vw);
            padding: 22px 28px;
            border-radius: 14px;
            text-decoration: none;
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(145deg, #0a3a26 0%, #063d29 50%, #052a1c 100%);
            border: 2px solid rgba(255,215,0,0.5);
            box-shadow: 0 5px 20px rgba(0,0,0,0.6), 0 0 22px rgba(29,185,122,0.18);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(255,215,0,0.6);
        }
        .card span {
            display: block;
            margin-top: 6px;
            font-size: 13px;
            font-weight: normal;
            color: #e8c874;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <h1>♦ Casino Games ♦</h1>
    <a class="card" href="bejeweled.html">💎 Bejeweled<span>Classic matching game</span></a>
    <a class="card" href="bejeweled2.html">🎰 Casino Royale<span>Bejeweled — latest version</span></a>
    <a class="card" href="snake-and-ladders.html">🐍 Snake and Ladders<span>Classic board game</span></a>
</body>
</html>
